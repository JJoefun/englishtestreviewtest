  {id:"h210",en:"guerrilla muralist",ipa:"/ɡəˈrɪlə ˈmjʊərəlɪst/",pos:"n.",u:"HW2",zh:"游擊壁畫藝術家",def:`an artist who paints murals in public, often without permission`,eg:`The guerrilla muralists of 1970s New York challenged institutions.`,eg2:`Someone painted a huge mural on the wall overnight — a real guerrilla muralist.`,syn:`拆解 guerrilla 游擊(隊)的、非正規突襲的 + muralist 壁畫家(mural 壁畫 + -ist 人)`},
  {id:"h211",en:"sought",ipa:"/sɔːt/",pos:"v.",u:"HW2",zh:"尋求（seek 的過去式/過去分詞）",def:`past and past participle of seek: tried to find or obtain`,eg:`Artists have always sought to subvert institutional gatekeeping.`,eg2:`I sought help from my teacher when I couldn't solve the problem.`,syn:`文中形式：sought 是 seek 的過去式/過去分詞；文中 sought to subvert = 尋求顛覆(seek to + V)`},
  {id:"h212",en:"subvert",ipa:"/səbˈvɜːt/",pos:"v.",u:"HW2",zh:"顛覆",def:`to try to destroy or undermine an established system or authority`,eg:`Artists have always sought to subvert the gatekeeping of culture.`,eg2:`The kids tried to subvert bedtime by hiding under the blanket and pretending to sleep.`,syn:`文中形式：文中 subvert the institutional gatekeeping = 顛覆機構把關；及物動詞直接接受詞`},
  {id:"h213",en:"institutional gatekeeping",ipa:"/ˌɪnstɪˈtjuːʃənəl ˈɡeɪtkiːpɪŋ/",pos:"phr.",u:"HW2",zh:"機構式的把關、機制審查",def:`control by institutions over what is accepted or allowed`,eg:`They aim to challenge institutional gatekeeping.`,eg2:`Getting past the receptionist felt like passing institutional gatekeeping.`,syn:`拆解 institutional 機構的、體制的 + gatekeeping 把關、守門(gate 門 + keep 看守)`},
  {id:"h214",en:"self-consciousness",ipa:"/ˌselfˈkɒnʃəsnəs/",pos:"n.",u:"HW2",zh:"自覺、自我意識",def:`awareness of oneself, sometimes with unease or deliberate reflection`,eg:`What is different today is the self-consciousness of the effort.`,eg2:`He danced with total self-consciousness, worrying everyone was watching him.`,syn:`文中形式：文中 the self-consciousness of the effort = 這股努力的自覺`},
  {id:"h215",en:"contemporary practitioner",ipa:"/kənˈtempərəri prækˈtɪʃənə/",pos:"n.",u:"HW2",zh:"當代實踐者、當代從業者",def:`a person who currently works in a particular field or art`,eg:`Contemporary practitioners speak of decolonising the canon.`,eg2:`As a contemporary practitioner of yoga, she teaches classes online every day.`},
  {id:"h216",en:"decolonise",ipa:"/diːˈkɒlənaɪz/",pos:"v.",u:"HW2",zh:"去殖民化",def:`to remove the effects of colonial power or dominant culture`,eg:`They speak of decolonising the cultural canon.`,eg2:`The new manager wants to decolonise the office coffee list and add local drinks.`,syn:`文中形式：文中動名詞 decolonising the cultural canon；英式拼 -ising(美式 -izing)`},
  {id:"h217",en:"cultural canon",ipa:"/ˈkʌltʃərəl ˈkænən/",pos:"n.",u:"HW2",zh:"文化經典",def:`the body of works traditionally regarded as the most important`,eg:`They question whose work belongs in the cultural canon.`,eg2:`The Harry Potter books have become part of the modern cultural canon.`,syn:`拆解 cultural 文化的 + canon 經典作品總集、正典(≠ cannon 大砲，拼字差一個 n)`},
  {id:"h218",en:"dismantle",ipa:"/dɪsˈmæntl/",pos:"v.",u:"HW2",zh:"拆除、解構",def:`to take apart or gradually destroy a system or structure`,eg:`They aim at dismantling long-standing hierarchies.`,eg2:`I had to dismantle the bookshelf before we could move it out the door.`,syn:`文中形式：文中動名詞 dismantling the hierarchies = 拆解階層制度(抽象「逐步瓦解」用法)`},
  {id:"h219",en:"hierarchy",ipa:"/ˈhaɪərɑːki/",pos:"n.",u:"HW2",zh:"等級制度、階層",def:`a system in which people or things are ranked by status`,eg:`The hierarchies determine whose stories are worth telling.`,eg2:`In our office, there's a clear hierarchy: interns at the bottom, the boss at the top.`},
  {id:"h220",en:"coercive",ipa:"/kəʊˈɜːsɪv/",pos:"adj.",u:"HW2",zh:"強迫性的、具強制力的",def:`using force or pressure to make people do things unwillingly`,eg:`Immersive installations can feel coercive to some audiences.`,eg2:`Making me finish all my vegetables felt a bit coercive when I was a kid.`,syn:`文中形式：文中 can feel coercive = 令人感到被強迫；源自 coerce 強迫(動詞)`},
  {id:"h221",en:"foreground",ipa:"/ˈfɔːɡraʊnd/",pos:"v.",u:"HW2",zh:"強調、使受到關注",def:`to make something the most prominent or important feature`,eg:`Work that foregrounds identity can seem didactic.`,eg2:`The news report foregrounds the good news and hides the bad parts.`,syn:`文中形式：⚠️ 文中當動詞：Work that foregrounds identity = 凸顯身分(非名詞「前景」)`},
  {id:"h222",en:"didactic",ipa:"/daɪˈdæktɪk/",pos:"adj.",u:"HW2",zh:"說教的、教條式的",def:`intended to teach a moral lesson, often too obviously`,eg:`Such work can seem didactic to some viewers.`,eg2:`The movie was too didactic — it kept telling me what lesson to learn.`,syn:`文中形式：文中 can seem didactic = 顯得說教；形容詞`},
  {id:"h223",en:"aesthetic",ipa:"/iːsˈθetɪk/",pos:"adj.",u:"HW2",zh:"美學的、審美的",def:`relating to beauty or the appreciation of beauty`,eg:`They approach art in search of aesthetic pleasure.`,eg2:`I chose this lamp for aesthetic reasons; it just looks nice.`,syn:`文中形式：文中 aesthetic pleasure = 美感愉悅；也可當名詞 an aesthetic(美學風格)`},
  {id:"h224",en:"critique",ipa:"/krɪˈtiːk/",pos:"n.",u:"HW2",zh:"評論、批判",def:`a detailed analysis and assessment of something`,eg:`They seek aesthetic pleasure rather than social critique.`,eg2:`My friend gave me an honest critique of my cooking — tasty, but too salty.`,syn:`文中形式：文中 social critique = 社會批判(名詞)；critique 也可當動詞「評析」；≠ critic(評論家,人)`},
  {id:"h225",en:"accessibility",ipa:"/əkˌsesəˈbɪləti/",pos:"n.",u:"HW2",zh:"可及性、普及度",def:`the quality of being easy to reach, use, or understand`,eg:`The pursuit of accessibility can flatten complexity.`,eg2:`The new lift improved accessibility for people with wheelchairs.`},
  {id:"h226",en:"flatten",ipa:"/ˈflætn/",pos:"v.",u:"HW2",zh:"抹平、使扁平化",def:`to make something less varied, complex, or interesting`,eg:`Accessibility can flatten the complexity that makes art valuable.`,eg2:`Turning the story into a short summary really flattens all the fun details.`,syn:`文中形式：文中 can flatten the complexity = 抹平複雜性(使變單調)；原意「壓平」`},
  {id:"h227",en:"counterargument",ipa:"/ˈkaʊntərˌɑːɡjumənt/",pos:"n.",u:"HW2",zh:"反駁論點、抗辯",def:`an argument put forward to oppose another argument`,eg:`The most compelling counterargument is the work itself.`,eg2:`Whatever I say, my brother always has a counterargument ready.`},
  {id:"h228",en:"marginalised",ipa:"/ˈmɑːdʒɪnəlaɪzd/",pos:"adj.",u:"HW2",zh:"邊緣化的、弱勢的",def:`treated as unimportant and pushed to the edge of society`,eg:`A marginalised community sees its own stories told.`,eg2:`New students can feel marginalised until they make some friends.`,syn:`文中形式：文中被動/形容詞 a marginalised community = 被邊緣化的社群；英式拼 -ised`},
  {id:"h229",en:"reverence",ipa:"/ˈrevərəns/",pos:"n.",u:"HW2",zh:"敬意、尊崇",def:`a feeling of deep respect or admiration`,eg:`Its stories are told with skill and reverence.`,eg2:`She treats her grandmother's recipes with great reverence.`},
  {id:"h230",en:"vernacular",ipa:"/vəˈnækjələ/",pos:"n.",u:"HW2",zh:"在地話、方言、本地文化表達",def:`the everyday language or cultural expression of ordinary people`,eg:`Its vernacular and its humour are taken seriously.`,eg2:`In everyday vernacular, we say 'gonna' instead of 'going to'.`,syn:`文中形式：文中 its vernacular = 其在地語言/文化表達；也可當形容詞 vernacular architecture`},
  {id:"h231",en:"grief",ipa:"/ɡriːf/",pos:"n.",u:"HW2",zh:"悲傷、哀痛",def:`very deep sadness, especially after a loss`,eg:`Its grief is rendered in a form that demands to be taken seriously.`,eg2:`He was filled with grief when his dog passed away.`},
  {id:"h232",en:"canonical",ipa:"/kəˈnɒnɪkəl/",pos:"adj.",u:"HW2",zh:"經典的、正統的",def:`belonging to the accepted body of important works`,eg:`The effect surpasses what any canonical text ever managed.`,eg2:`'Romeo and Juliet' is a canonical example of a tragic love story.`,syn:`文中形式：文中 no canonical text = 沒有任何經典文本；形容詞(源自 canon 正典)`},
  {id:"h233",en:"elimination",ipa:"/ɪˌlɪmɪˈneɪʃən/",pos:"n.",u:"HW2",zh:"消除、排除",def:`the act of completely removing something`,eg:`This is not the elimination of difficulty, but its relocation.`,eg2:`Cleaning my desk is really about the elimination of clutter.`,syn:`文中形式：文中 the elimination of difficulty = 消除困難(elimination of + 名詞)`},
  {id:"h234",en:"contentious",ipa:"/kənˈtenʃəs/",pos:"adj.",u:"HW2",zh:"具爭議性的、引起爭論的（帶「吵起來」的火藥味）",def:`likely to cause disagreement or argument; marked by heated arguments`,eg:`The conversation is messy, contentious, and increasingly loud.`,eg2:`Whose turn it is to do the dishes is a contentious topic in our house.`,syn:`⚠️ 辨析 contentious vs controversial：①形容「議題」時兩者幾乎可互換（a contentious/controversial issue）②contentious 語氣較火爆、情緒化（吵起來）；controversial 是「引發公眾意見分歧」（不一定吵）③只有 contentious 能形容「人」= 好爭辯的（a contentious person）／「氣氛」= 火爆的（The meeting turned contentious）；controversial person = 引發公眾爭議的人（意思不同）④大範圍分裂公眾意見用 controversial 較精準｜對比例：The controversial film was banned.（引發爭議）vs The contentious film screening ended with audience members shouting.（現場吵起來）｜文中 messy, contentious, increasingly loud = 取其「爭論不休」的火藥味`},
  {id:"h235",en:"draw on",ipa:"/drɔː ɒn/",pos:"phr. v.",u:"HW2",zh:"利用、汲取（資訊、知識、經驗、資源）",def:`to use information, knowledge, or experience to help you do something`,eg:`The movement draws on a long history of avant-garde provocation.`,eg2:`When I cook, I draw on my grandma's recipes and my own experiments.`,syn:`C1 片語；draw on/upon 通用；例 His novels draw heavily on his childhood.`,cam:"draw-on"},

  // HW2 續（Slow Travel 慢遊文章單字，含文中片語/特殊形式）
  {id:"h236",en:"radical",ipa:"/ˈrædɪkəl/",pos:"adj.",u:"HW2",zh:"激進的、根本性的",def:`believing or expressing the belief that there should be great or extreme social or political change`,eg:`The idea of travelling slowly seems almost radical.`,eg2:`Cutting my screen time to zero was a radical change for me.`,syn:`文中作形容詞「近乎激進的想法」；radical 也可當名詞(激進份子)`},
  {id:"h237",en:"deliberately",ipa:"/dɪˈlɪbərətli/",pos:"adv.",u:"HW2",zh:"刻意地、故意地",def:`intentionally, on purpose`,eg:`A growing movement of travellers is deliberately choosing trains over planes.`,eg2:`She deliberately arrived late so she wouldn't have to make small talk.`,syn:`文中 deliberately choosing = 刻意選擇；辨析 deliberately(故意) vs accidentally(不小心)`},
  {id:"h238",en:"mentality",ipa:"/menˈtæləti/",pos:"n.",u:"HW2",zh:"心態、思維方式",def:`a person's particular way of thinking about things`,eg:`Slow travel is a rejection of the checklist mentality.`,eg2:`He has a winner-takes-all mentality about everything.`,syn:`文中 checklist mentality = 打卡式心態(把景點當清單一項項勾)`},
  {id:"h239",en:"mainstream",ipa:"/ˈmeɪnstriːm/",pos:"adj./n.",u:"HW2",zh:"主流的、主流",def:`considered normal, and having or using ideas, beliefs, etc. that are accepted by most people`,eg:`...the checklist mentality that dominates mainstream tourism.`,eg2:`Streaming has become the mainstream way to watch films.`,syn:`文中作形容詞 mainstream tourism = 主流觀光；也可當名詞 the mainstream`},
  {id:"h240",en:"curated itinerary",ipa:"/ˈkjʊəreɪtɪd aɪˈtɪnərəri/",pos:"phr.",u:"HW2",zh:"精心安排的行程",def:`a carefully planned and selected travel schedule`,eg:`...armed with a guidebook and a tightly curated itinerary...`,eg2:`The travel agent gave us a fully curated itinerary for the whole week.`,syn:`拆解 curated 精選策劃的(源自 curate 策展) + itinerary 行程表；文中 tightly curated = 排得密密麻麻的`},
  {id:"h241",en:"depart",ipa:"/dɪˈpɑːt/",pos:"v.",u:"HW2",zh:"出發、離開",def:`to leave a place, especially to start a journey`,eg:`The conventional tourist often departs knowing little more about a place than on arrival.`,eg2:`Our flight departs at 6 a.m., so we need to leave home early.`,syn:`文中形式 departs(第三人稱單數)；辨析 depart(離開) ⇔ arrive(抵達)；名詞 departure`},
  {id:"h242",en:"linger",ipa:"/ˈlɪŋɡə/",pos:"v.",u:"HW2",zh:"逗留、流連",def:`to stay somewhere longer than necessary, often because you don't want to leave`,eg:`The slow traveller lingers long enough to learn the baker's name.`,eg2:`We lingered at the dinner table long after the meal was over.`,syn:`文中 lingers long enough to... = 待得夠久久到能…`},
  {id:"h243",en:"stumble",ipa:"/ˈstʌmbl/",pos:"v.",u:"HW2",zh:"偶然發現、絆倒",def:`to find or discover something by chance (stumble upon/across); also to trip while walking`,eg:`...to stumble — by serendipity — upon a festival that no algorithm had recommended.`,eg2:`I stumbled upon a great little bookshop while wandering around.`,syn:`文中片語 stumble upon = 偶然發現；stumble 原意也指「絆倒」`},
  {id:"h244",en:"serendipity",ipa:"/ˌserənˈdɪpəti/",pos:"n.",u:"HW2",zh:"機緣巧合、意外發現美好事物",def:`the fact of finding interesting or valuable things by chance`,eg:`...to stumble, by serendipity, upon a festival...`,eg2:`By serendipity, I met my best friend while queuing for coffee.`,syn:`形容詞 serendipitous、副詞 serendipitously；文中 by serendipity = 出於機緣巧合`},
  {id:"h245",en:"algorithm",ipa:"/ˈælɡərɪðəm/",pos:"n.",u:"HW2",zh:"演算法",def:`a set of steps or rules a computer follows to solve a problem or make recommendations`,eg:`...a festival that no algorithm had recommended.`,eg2:`The app's algorithm keeps showing me cat videos.`,syn:`注意拼字 algorithm(不是 -ithm 前少字母)`},
  {id:"h246",en:"compelling",ipa:"/kəmˈpelɪŋ/",pos:"adj.",u:"HW2",zh:"強而有力的、令人信服的",def:`so interesting or exciting that it holds your attention; convincing`,eg:`The environmental argument for slow travel is equally compelling.`,eg2:`She made a compelling case for working from home.`,syn:`文中 equally compelling = 同樣有說服力；compelling argument/reason 是常見搭配`},
  {id:"h247",en:"long-haul",ipa:"/ˌlɒŋˈhɔːl/",pos:"adj.",u:"HW2",zh:"長途的(尤指航程)",def:`travelling a long distance, especially a long flight`,eg:`Long-haul flights carry a disproportionate carbon cost.`,eg2:`We took a long-haul flight from Taipei to London.`,syn:`⇔ short-haul(短程)；文中 long-haul flights = 長途航班`},
  {id:"h248",en:"meander",ipa:"/miˈændə/",pos:"v.",u:"HW2",zh:"蜿蜒而行、漫遊",def:`to walk or travel slowly with no clear direction, following a winding route`,eg:`Travellers who meander through a region by train or bicycle...`,eg2:`We meandered through the old town with no particular plan.`,syn:`文中片語 meander through = 悠閒漫遊穿越；原指河流「蜿蜒」`},
  {id:"h249",en:"produce a fraction",ipa:"/prəˈdjuːs ə ˈfrækʃən/",pos:"phr.",u:"HW2",zh:"只產生一小部分",def:`to create only a very small amount of something`,eg:`...meander through a region... produce a fraction of this footprint.`,eg2:`Electric cars produce a fraction of the emissions petrol cars do.`,syn:`拆解 produce 產生 + a fraction of 一小部分的；a fraction of = 僅…的一小部分`},
  {id:"h250",en:"quantify",ipa:"/ˈkwɒntɪfaɪ/",pos:"v.",u:"HW2",zh:"量化、以數字衡量",def:`to measure or express something as a number or amount`,eg:`The psychological benefits are harder to quantify.`,eg2:`It's hard to quantify how much I've learned this year.`,syn:`文中 harder to quantify = 較難量化；名詞 quantity 數量`},
  {id:"h251",en:"restorative",ipa:"/rɪˈstɒrətɪv/",pos:"adj.",u:"HW2",zh:"恢復(精神/體力)的、療癒的",def:`making you feel stronger, healthier, or more relaxed`,eg:`Many slow travellers describe a restorative quality to the experience.`,eg2:`A good night's sleep is deeply restorative.`,syn:`源自 restore(恢復)；restorative quality = 療癒/恢復的特質`},
  {id:"h252",en:"sojourn",ipa:"/ˈsɒdʒɜːn/",pos:"n.",u:"HW2",zh:"短暫停留、逗留",def:`a short period when a person stays in a particular place`,eg:`A month-long sojourn allows both in abundance.`,eg2:`During my sojourn in Kyoto, I visited a temple every morning.`,syn:`較正式/文學用字；介係詞 a sojourn IN a place。⚠️ 辨析 sojourn(講「人在哪」，暫居某地) vs sabbatical(講「工作狀態」，停職休假)——不同類別可同時發生：During his sabbatical, he undertook a sojourn at the Bodleian Library.`},
  {id:"h253",en:"abundance",ipa:"/əˈbʌndəns/",pos:"n.",u:"HW2",zh:"大量、豐富",def:`a very large quantity of something`,eg:`A month-long sojourn allows both in abundance.`,eg2:`The garden had fruit in abundance that summer.`,syn:`片語 in abundance = 大量地、充足地；形容詞 abundant`},
  {id:"h254",en:"privilege",ipa:"/ˈprɪvəlɪdʒ/",pos:"n.",u:"HW2",zh:"特權、優待",def:`an advantage that only one person or group of people has, usually because of their position or wealth`,eg:`Critics argue that slow travel is a privilege reserved for the wealthy.`,eg2:`Having free time to travel is a privilege not everyone has.`,syn:`形容詞 privileged(享有特權的)；文中 a privilege reserved for the wealthy`},
  {id:"h255",en:"sabbatical",ipa:"/səˈbætɪkəl/",pos:"n.",u:"HW2",zh:"休假年、(長期工作後的)長假",def:`a period when someone stops their normal work in order to study, travel, or rest`,eg:`Not every family can take a six-week sabbatical in Andalusia.`,eg2:`After ten years at the company, she took a three-month sabbatical.`,syn:`片語 on sabbatical=休假中；sabbatical FROM work；源自 Sabbath(希伯來文 shabbāth=休息)，傳統教授每7年一次，現企業也有。⚠️ 辨析 sabbatical(從工作抽離) vs sojourn(暫居某地，與工作無關)`},
  {id:"h256",sp:[{label:"名詞 /ˈædvəkət/ an advocate",text:"She is an advocate."},{label:"動詞 /ˈædvəkeɪt/ to advocate",text:"They advocate reform."}],en:"advocate",ipa:"/ˈædvəkət/",pos:"n.",u:"HW2",zh:"倡導者、支持者",def:`a person who publicly supports or recommends a particular cause or policy`,eg:`Advocates suggest that the principles of slow travel can be applied on any scale.`,eg2:`She's a strong advocate for mental health awareness.`,syn:`名詞 /ˈædvəkət/ 倡導者 vs 動詞 /ˈædvəkeɪt/ 提倡(重音同,尾音不同)；片語 an advocate for/of`},
  {id:"h257",en:"in haste",ipa:"/ɪn heɪst/",pos:"phr.",u:"HW2",zh:"匆忙地、倉促地",def:`quickly, in a hurried way`,eg:`...exploring one neighbourhood in depth rather than three cities in haste.`,eg2:`I replied in haste and later regretted what I wrote.`,syn:`片語 in haste = 匆忙(⇔ in depth 深入地，文中兩者對比)；諺語 more haste, less speed`},
  {id:"h258",en:"resist the urge",ipa:"/rɪˈzɪst ði ɜːdʒ/",pos:"phr.",u:"HW2",zh:"克制…的衝動",def:`to stop yourself from doing something you want to do`,eg:`...resisting the urge to photograph everything...`,eg2:`I had to resist the urge to check my phone during dinner.`,syn:`拆解 resist 抵抗 + the urge to V 做…的衝動；resist 後接 V-ing 或名詞`},
  {id:"h259",en:"dwell",ipa:"/dwel/",pos:"v.",u:"HW2",zh:"(文中)沉浸、居住",def:`to live in a place; (dwell in/on) to spend time being in or thinking about something`,eg:`...simply dwelling in the moment.`,eg2:`Try not to dwell on your mistakes.`,syn:`⚠️ 介係詞決定語感：dwell in + 狀態=沉浸(中性～正面皆可)：dwell in joy / in the moment ✅；dwell on + 事情=反覆糾結(偏負面)：dwell on past mistakes ❌。要講「沉浸美好」用 dwell in(或 savour/immerse in)`},
  // HW2 續（Tate Modern 文章補充字 + legitimate）
  {id:"h260",en:"immersive installation",ipa:"/ɪˈmɜːsɪv ˌɪnstəˈleɪʃən/",pos:"phr.",u:"HW2",zh:"沉浸式裝置藝術",def:`a three-dimensional artwork that surrounds viewers and invites them to enter and interact with it`,eg:`Immersive installations that invite participation can feel coercive to audiences unused to being asked to perform.`,eg2:`We went to an immersive installation where you walk through a room full of mirrors and lights.`,syn:`拆解 immersive 沉浸式的、身歷其境的(源自 immerse 浸入) + installation (藝術)裝置＝三維、場域特定的作品，觀眾「走進去」用多重感官參與，而非站在外面看｜文中形式：複數 Immersive installations that invite participation`},
  {id:"h261",en:"render",ipa:"/ˈrendə/",pos:"v.",u:"HW2",zh:"呈現、表現；使成為",def:`to represent or express something in a particular form; also to cause someone or something to be in a particular state`,eg:`...when its vernacular, its grief, and its humour are rendered in a form that demands to be taken seriously...`,eg2:`His remarks rendered me speechless.（他的話讓我啞口無言）`,syn:`文中形式：被動 are rendered in a form = 被呈現成某種形式（「表達/表現」義）｜另一常見義 render + 受詞 + 形容詞 = 使變得：rendered me speechless／rendered it useless｜Cambridge 繁中：引起、使成為/使變得、翻譯、表達/表演`},
  {id:"h262",en:"transformative",ipa:"/trænsˈfɔːmətɪv/",pos:"adj.",u:"HW2",zh:"帶來重大改變的、翻轉性的",def:`causing a major change to something or someone, especially in a way that makes it better`,eg:`...the effect can be transformative in ways that no canonical text ever managed.`,eg2:`Learning to cook was transformative for my health.`,syn:`源自 transform 轉變；搭配 transformative effect/power/experience/leader｜同源 transformational 幾乎同義`},
  {id:"h263",en:"manage",ipa:"/ˈmænɪdʒ/",pos:"v.",u:"HW2",zh:"（文中）做到、辦到",def:`to succeed in doing something, especially something difficult`,eg:`...the effect can be transformative in ways that no canonical text ever managed.`,eg2:`I managed to finish the report before midnight.`,syn:`⚠️ 文中形式：ever managed = 曾做到（此處 manage 不是「管理」，是「辦到、做成」）｜常見 manage to + V（設法做到）；也可像文中單獨使用`},
  {id:"h264",en:"legitimate",ipa:"/ləˈdʒɪtəmət/",pos:"adj.",u:"HW2",zh:"合法的；正當合理的",def:`1) allowed by law  2) reasonable and acceptable`,eg:`Her complaints were quite legitimate.（她的抱怨相當合理）／ a legitimate business（合法生意）`,eg2:`That's a legitimate question — I hadn't thought of it.`,syn:`兩個主要意思 ①合法的(allowed by law)：legitimate business/refugees/claim ②正當合理的(reasonable and acceptable)：a legitimate concern/question/fear｜名詞 legitimacy 正當性/合法性；動詞 legitimize/legitimate 使…合法化、使…看起來正當｜註：此字不在文章中，為額外補充`},


  // ---------- HW3：Community Policing 文章單字（Cambridge UK 音標） ----------
  {id:"h301",en:"mandatory",ipa:"/ˈmændətəri/",pos:"adj.",u:"HW3",zh:"強制性的、法律規定必須的",def:`something that must be done, or is demanded by law`,eg:`Carrying a knife — even "for protection" — carries a mandatory minimum sentence.`,eg2:`Wearing a helmet is mandatory on this construction site.`,syn:`文中 a mandatory minimum sentence = 法定最低刑度（法院無裁量空間）｜同義 compulsory、obligatory｜⇔ optional、voluntary｜US 音 /ˈmændətɔːri/`},
  {id:"h302",en:"stabbing",ipa:"/ˈstæbɪŋ/",pos:"n.",u:"HW3",zh:"持刀攻擊（事件）、刺傷",def:`an occasion when someone is injured or killed with a knife`,eg:`...a street where three stabbings occurred last year.`,eg2:`The news reported a stabbing outside the station last night.`,syn:`文中複數 three stabbings occurred = 發生三起持刀傷人案｜動詞 stab 刺（stab-stabbed-stabbed）｜也可當形容詞 a stabbing pain 刺痛`},
  {id:"h303",en:"less A than B",ipa:"/les ... ðæn/",pos:"phr.",u:"HW3",zh:"與其說是 A，不如說是 B",def:`used to say that the second description is more accurate than the first`,eg:`Officer Chen is less a law enforcer than a social worker.`,eg2:`This isn't less a job than a lifestyle.（這與其說是工作，不如說是一種生活方式）`,syn:`⚠️ 文中句型：less a law enforcer than a social worker = 與其說她是執法者，不如說是社工｜A、B 結構要對稱（名詞對名詞）｜同義句型 more B than A、not so much A as B`},
  {id:"h304",en:"counsellor",ipa:"/ˈkaʊnsələr/",pos:"n.",u:"HW3",zh:"諮商師、輔導員",def:`someone whose job is to give advice and help with personal problems`,eg:`Officer Chen is less a law enforcer than a social worker, a counsellor, and, occasionally, a reluctant parent.`,eg2:`The school counsellor helped me choose a major.`,syn:`⚠️ 英式拼 counsellor（雙 l）／美式 counselor（單 l）——文章是英式｜動詞 counsel 提供諮商／建議｜注意 ≠ councillor（議員，來自 council 議會）`},
  {id:"h305",en:"reluctant",ipa:"/rɪˈlʌktənt/",pos:"adj.",u:"HW3",zh:"不情願的、勉強的",def:`not willing to do something and therefore slow to do it`,eg:`...and, occasionally, a reluctant parent.`,eg2:`I was reluctant to lend him money again.`,syn:`文中 a reluctant parent = 不情願扮演的家長角色｜常見 be reluctant to + V｜副詞 reluctantly 不情願地｜名詞 reluctance`},
  {id:"h306",en:"embedded",ipa:"/ɪmˈbedɪd/",pos:"adj.",u:"HW3",zh:"嵌入的、深植其中的",def:`fixed firmly and deeply into something; forming part of it`,eg:`Community policing — the philosophy that positions officers as embedded partners in the neighbourhoods they serve...`,eg2:`The idea is deeply embedded in our company culture.`,syn:`文中 embedded partners = 深植在社區裡的夥伴（相對於 an external force 外來力量）｜動詞 embed 嵌入｜也用於 embedded journalist（隨軍記者）`},
  {id:"h307",en:"dismiss",ipa:"/dɪˈsmɪs/",pos:"v.",u:"HW3",zh:"(文中)否定、不予考慮；也指解僱",def:`to refuse to accept that something might be true or important; also to remove someone from their job`,eg:`...has been alternately celebrated and dismissed over the past three decades.`,eg2:`Don't dismiss the idea before you've heard it.`,syn:`⚠️ 文中被動 has been celebrated and dismissed = 一下被讚揚、一下被否定（此處是「否定/看不起」，不是「解僱」）｜片語 dismiss sth as... 把…斥為｜名詞 dismissal`},
  {id:"h308",en:"sustained",ipa:"/səˈsteɪnd/",pos:"adj.",u:"HW3",zh:"持續的、長時間不中斷的",def:`continuing for a long time without becoming weaker`,eg:`Its advocates argue that sustained, visible, non-confrontational presence builds the trust...`,eg2:`It takes sustained effort to learn a language.`,syn:`文中三個形容詞並列修飾 presence：sustained（持續）、visible（看得見）、non-confrontational（不對抗）｜動詞 sustain 維持｜⚠️ 名詞 sustainability 是「永續」，形容詞 sustained 是「持續的」，別混`},
  {id:"h309",en:"non-confrontational",ipa:"/ˌnɒnkɒnfrʌnˈteɪʃənəl/",pos:"adj.",u:"HW3",zh:"不對抗的、不衝突的",def:`not causing or involving argument or fighting`,eg:`...sustained, visible, non-confrontational presence builds the trust that makes communities safer over time.`,eg2:`She has a non-confrontational way of giving feedback.`,syn:`拆解 non-（否定字首）+ confrontational 對抗的（源自 confront 面對/對抗）｜名詞 confrontation 對峙`},
  {id:"h310",en:"contend",ipa:"/kənˈtend/",pos:"v.",u:"HW3",zh:"(文中)主張、聲稱；也指競爭、應付",def:`to say that something is true, especially in an argument; also to compete, or to deal with (contend with)`,eg:`Its critics contend that it asks officers to perform roles they are neither trained nor resourced to fulfil.`,eg2:`He contends that the rules are unfair.`,syn:`⚠️ 文中 critics contend that... = 批評者主張…（正式的「主張」，比 say 更有論辯感）｜另一常見義 contend with sth = 應付/對抗某難題｜名詞 contention 論點/爭執；形容詞 contentious 爭議的（HW2 學過）`},
  {id:"h311",en:"resourced",ipa:"/rɪˈzɔːst/",pos:"adj.",u:"HW3",zh:"有資源支援的、被配置資源的",def:`provided with the money, staff, or equipment needed`,eg:`...roles they are neither trained nor resourced to fulfil.`,eg2:`The team is well resourced but short on time.`,syn:`⚠️ 文中 neither trained nor resourced to fulfil = 既沒受訓、也沒配到資源去做｜resource 當動詞用（提供資源）的過去分詞｜常見 well-resourced / under-resourced`},
  {id:"h312",en:"veneer",ipa:"/vəˈnɪər/",pos:"n.",u:"HW3",zh:"(比喻)表象、假象；(原意)薄板貼皮",def:`a thin layer that hides what something is really like; literally a thin layer of wood`,eg:`...it can serve as a veneer of engagement over systemic neglect.`,eg2:`His politeness was just a veneer — he was furious underneath.`,syn:`⚠️ 文中比喻用法 a veneer of engagement over systemic neglect = 用「參與」的薄薄表象，蓋住系統性的忽視｜片語 a veneer of + 名詞｜原意是家具的「貼皮薄板」，比喻「虛有其表的一層」`},
  {id:"h313",en:"systemic neglect",ipa:"/sɪˈstemɪk nɪˈɡlekt/",pos:"phr.",u:"HW3",zh:"系統性的忽視",def:`failure to provide care or support that is built into the whole system, not just one case`,eg:`...a veneer of engagement over systemic neglect.`,eg2:`The report blamed systemic neglect rather than individual mistakes.`,syn:`拆解 systemic 整個體系的、根植於制度的（≠ systematic 有系統/有條理的！）+ neglect 忽視、疏於照顧｜⚠️ systemic vs systematic 是經典易混：systemic=影響整個系統的；systematic=按部就班的`},
  {id:"h314",en:"genuinely",ipa:"/ˈdʒenjuɪnli/",pos:"adv.",u:"HW3",zh:"真正地、確實地",def:`really and sincerely`,eg:`The evidence is genuinely mixed.`,eg2:`I'm genuinely sorry about what happened.`,syn:`文中 genuinely mixed = 真的是好壞參半（強調「不是客套話，是真的」）｜形容詞 genuine 真的/真誠的｜⚠️ 發音 /ˈdʒenjuɪn/，不是 /-aɪn/`},
  {id:"h315",en:"recidivism",ipa:"/rɪˈsɪdɪvɪzəm/",pos:"n.",u:"HW3",zh:"再犯（率）",def:`the tendency of a criminal to commit crimes again after being punished`,eg:`...community policing programmes can reduce recidivism rates...`,eg2:`The programme aims to lower recidivism among young offenders.`,syn:`文中 recidivism rates = 再犯率｜法律/犯罪學術語｜相關 recidivist 累犯（人）`},
  {id:"h316",en:"distrust",ipa:"/dɪˈstrʌst/",pos:"n./v.",u:"HW3",zh:"不信任",def:`the feeling that you cannot trust someone or something`,eg:`...particularly in marginalised areas where distrust of institutions runs deep.`,eg2:`There's a lot of distrust between the two departments.`,syn:`文中 distrust of institutions = 對體制的不信任（distrust of + 對象）｜辨析 distrust（有理由的不信任）vs mistrust（較模糊的疑慮），多數情況可互換`},
  {id:"h317",en:"run deep",ipa:"/rʌn diːp/",pos:"phr.",u:"HW3",zh:"根深蒂固、積怨已久",def:`(of a feeling) to be very strong and to have existed for a long time`,eg:`...where distrust of institutions runs deep.`,eg2:`Family loyalties run deep in this town.`,syn:`⚠️ 文中形式 distrust...runs deep（第三人稱單數）｜固定用法：主詞多是情緒/感受（distrust, resentment, loyalty, hatred）｜語感：不只是「強烈」，而是「積累很久、埋很深」`},
  {id:"h318",en:"corresponding",ipa:"/ˌkɒrɪˈspɒndɪŋ/",pos:"adj.",u:"HW3",zh:"相對應的、相配套的",def:`matching or related to something else`,eg:`...without corresponding investment in education, mental health services, and housing...`,eg2:`Sales rose 10%, with a corresponding increase in profit.`,syn:`文中 corresponding investment = 相對應（同等規模）的投資——沒有配套投資，治安改善就只是暫時的｜動詞 correspond to/with 對應於｜副詞 correspondingly`},
  {id:"h319",en:"crisis / crises",ipa:"/ˈkraɪsɪs/ /ˈkraɪsiːz/",pos:"n.",u:"HW3",zh:"危機（單數／複數）",def:`a time of great disagreement, confusion, or suffering`,eg:`She has watched the same three families cycle through the same three crises — debt, addiction, domestic violence — for four years.`,eg2:`The company is going through a financial crisis.`,syn:`⚠️ 不規則複數：crisis /ˈkraɪsɪs/ → crises /ˈkraɪsiːz/（發音也變！-is → -es）｜同類 analysis→analyses、thesis→theses、basis→bases`},
  {id:"h320",en:"apprehend",ipa:"/ˌæprɪˈhend/",pos:"v.",u:"HW3",zh:"逮捕（正式）",def:`(of the police) to catch and arrest someone`,eg:`She can apprehend offenders; she cannot ameliorate the conditions that produce them.`,eg2:`The suspect was apprehended at the airport.`,syn:`文中與 ameliorate 對比：能 apprehend（抓人）卻不能 ameliorate（改善根源）｜正式用字，日常多用 arrest｜名詞 apprehension（也可指「憂慮」）`},
  {id:"h321",en:"offender",ipa:"/əˈfendər/",pos:"n.",u:"HW3",zh:"罪犯、違法者",def:`someone who has committed a crime`,eg:`She can apprehend offenders...`,eg2:`First-time offenders often get a lighter sentence.`,syn:`文中複數 apprehend offenders｜動詞 offend 冒犯/犯法｜常見 first-time offender 初犯、repeat offender 累犯｜名詞 offence 罪行（美式 offense）`},
  {id:"h322",en:"ameliorate",ipa:"/əˈmiːliəreɪt/",pos:"v.",u:"HW3",zh:"改善（不好的狀況）",def:`to make a bad situation better`,eg:`...she cannot ameliorate the conditions that produce them.`,eg2:`Nothing could ameliorate the damage caused by the flood.`,syn:`⚠️ 很正式的字｜受詞通常是「不好的東西」：ameliorate the conditions/situation/suffering｜同義 improve、alleviate（HW3 單字書也有 alleviate）｜名詞 amelioration`},
  {id:"h323",en:"briefing",ipa:"/ˈbriːfɪŋ/",pos:"n.",u:"HW3",zh:"簡報、勤前說明",def:`a meeting where people are given information or instructions`,eg:`This gap...is, she says, "the thing nobody wants to talk about in briefings."`,eg2:`We have a five-minute briefing before every shift.`,syn:`文中複數 in briefings = 在勤前簡報上｜動詞 brief sb on sth 向某人簡報｜也有 a press briefing 記者會簡報`},
  {id:"h324",en:"accountability",ipa:"/əˌkaʊntəˈbɪləti/",pos:"n.",u:"HW3",zh:"問責、課責（要為結果負責）",def:`the fact of being responsible for what you do and able to give a satisfactory reason for it`,eg:`The question of accountability is equally fraught.`,eg2:`There's no accountability when things go wrong here.`,syn:`文中 the question of accountability = 問責這個問題｜形容詞 accountable（be accountable to sb for sth 對某人就某事負責）｜辨析 accountability（要能交代、被追究）比 responsibility（職責）更強調「事後被檢驗」`},
  {id:"h325",en:"fraught",ipa:"/frɔːt/",pos:"adj.",u:"HW3",zh:"充滿問題的、令人焦慮的",def:`full of problems or worry; causing or feeling anxiety`,eg:`The question of accountability is equally fraught.`,eg2:`The atmosphere at dinner was fraught.`,syn:`⚠️ 兩種用法：① fraught with + 名詞 = 充滿（危險/困難）：fraught with danger ② 單獨當形容詞 = 焦慮的/緊繃的（文中即此用法）｜發音 /frɔːt/（同 fought 的母音）`},
  {id:"h326",en:"allegation",ipa:"/ˌæləˈɡeɪʃən/",pos:"n.",u:"HW3",zh:"指控（未經證實）",def:`a statement, made without giving proof, that someone has done something wrong`,eg:`Allegations of racial profiling within community policing programmes have led to fierce debate...`,eg2:`He denied the allegations against him.`,syn:`⚠️ 關鍵語感：allegation 是「**未經證實**的指控」（不是定罪）｜文中複數 Allegations of + 名詞｜動詞 allege 聲稱；形容詞 alleged 被指控的；副詞 allegedly 據稱（新聞常用來避免斷定）`},
  {id:"h327",en:"racial profiling",ipa:"/ˈreɪʃəl ˈprəʊfaɪlɪŋ/",pos:"phr.",u:"HW3",zh:"種族定性（以種族作為執法懷疑依據）",def:`the practice of suspecting someone of crime based on their race rather than evidence`,eg:`Allegations of racial profiling within community policing programmes have led to fierce debate.`,eg2:`The airport was accused of racial profiling in its security checks.`,syn:`拆解 racial 種族的（源自 race）+ profiling 側寫/建檔（源自 profile 側寫）｜社會/法律議題常見術語`},
  {id:"h328",en:"fierce",ipa:"/fɪəs/",pos:"adj.",u:"HW3",zh:"激烈的、猛烈的",def:`very strong or intense; violent`,eg:`...have led to fierce debate about whether increased police presence...`,eg2:`There's fierce competition for these jobs.`,syn:`文中 fierce debate = 激烈辯論｜常搭 fierce competition/criticism/opposition/debate｜也可形容動物兇猛：a fierce dog｜副詞 fiercely`},
  {id:"h329",en:"surveillance",ipa:"/səˈveɪləns/",pos:"n.",u:"HW3",zh:"監控、監視",def:`the careful watching of a person or place, especially by the police`,eg:`...whether increased police presence in certain neighbourhoods amounts to surveillance of communities rather than service to them.`,eg2:`The shop has 24-hour surveillance cameras.`,syn:`⚠️ 文中對比 surveillance of communities（監控社區）vs service to them（服務社區）——介係詞不同意思差很大｜片語 under surveillance 被監視中｜⚠️ 發音注意 /səˈveɪləns/（不發 -ll- 的 l 音重）`},
  {id:"h330",en:"scrutiny",ipa:"/ˈskruːtəni/",pos:"n.",u:"HW3",zh:"審視、嚴密檢視",def:`careful and detailed examination`,eg:`The line between visibility and scrutiny...is one that officers on the ground must navigate daily.`,eg2:`His finances came under scrutiny after the scandal.`,syn:`文中對比 visibility（能見度、讓人看得到）vs scrutiny（審視、盯著你看）——一線之隔｜片語 under scrutiny 被檢視；close scrutiny 嚴密審查｜動詞 scrutinise（英式）/scrutinize`},
  {id:"h331",en:"deterrence",ipa:"/dɪˈterəns/",pos:"n.",u:"HW3",zh:"嚇阻（讓人不敢犯罪）",def:`the fact of preventing people from doing something by making them afraid of the consequences`,eg:`The line between...deterrence and intimidation, is one that officers on the ground must navigate daily.`,eg2:`Speed cameras work mainly through deterrence.`,syn:`文中對比 deterrence（嚇阻，正當）vs intimidation（威嚇，過頭了）｜動詞 deter 嚇阻（deter sb from V-ing）；形容詞 deterrent（也可當名詞：a deterrent 嚇阻手段）`},
  {id:"h332",en:"intimidation",ipa:"/ɪnˌtɪmɪˈdeɪʃən/",pos:"n.",u:"HW3",zh:"威嚇、恐嚇",def:`the act of frightening or threatening someone`,eg:`The line between deterrence and intimidation...`,eg2:`Witnesses stayed silent out of fear of intimidation.`,syn:`文中與 deterrence 對比（見 deterrence 卡）｜動詞 intimidate 威嚇；形容詞 intimidating 令人生畏的（an intimidating interviewer）`},
  {id:"h333",en:"navigate",ipa:"/ˈnævɪɡeɪt/",pos:"v.",u:"HW3",zh:"(文中)拿捏、應對(複雜情況)；也指導航",def:`to deal successfully with a complicated situation; also to find your way`,eg:`The line between visibility and scrutiny...is one that officers on the ground must navigate daily.`,eg2:`It took me a year to learn how to navigate office politics.`,syn:`⚠️ 文中是比喻用法 navigate the line = 拿捏分寸（不是「導航」）｜常見 navigate a situation/system/politics｜名詞 navigation`},
  {id:"h334",en:"statutory",ipa:"/ˈstætʃətəri/",pos:"adj.",u:"HW3",zh:"法定的、成文法規定的",def:`decided or controlled by law`,eg:`...officers on the ground must navigate daily, often without clear statutory guidance.`,eg2:`Employers must give staff their statutory minimum holiday.`,syn:`文中 clear statutory guidance = 明確的法定指引（意思是：法律沒寫清楚，只能靠現場判斷）｜名詞 statute 成文法｜常見 statutory rights/duty/minimum`},
  {id:"h335",en:"confront",ipa:"/kənˈfrʌnt/",pos:"v.",u:"HW3",zh:"面對、正視(問題)",def:`to face and deal with a difficult situation or person`,eg:`The night shift is long. The problems it confronts are longer.`,eg2:`Sooner or later you have to confront the truth.`,syn:`⚠️ 文中形式 the problems it confronts（it = the night shift；關係子句省略 that）｜片語 be confronted with sth 面臨｜名詞 confrontation 對峙；形容詞 confrontational 對抗的（見 h309）`},
  {id:"h336",en:"on the ground",ipa:"/ɒn ðə ɡraʊnd/",pos:"phr.",u:"HW3",zh:"第一線的、實地的",def:`in the place where something is actually happening, rather than in an office`,eg:`...officers on the ground must navigate daily...`,eg2:`Reports from journalists on the ground tell a different story.`,syn:`文中 officers on the ground = 第一線員警（相對於坐辦公室訂政策的人）｜同義 frontline｜⚠️ 別跟 get off the ground（開始運作）搞混`},

  // ---------- HW3：單字書《3000 More Essential Words》A（音標照單字書 KK） ----------
  {id:"h341",en:"acknowledgement",ipa:"/əkˋnɑlɪdʒmənt/",pos:"n. (U,C)",u:"HW3",zh:"承認；感謝、致謝",def:`the act of admitting something is true, or of thanking someone`,eg:`A special award was given to Mr. Lee in acknowledgement of his contribution to the country.（為了表彰李先生對國家的貢獻，授予他一份特殊的獎賞）`,eg2:`She nodded in acknowledgement when I walked in.`,syn:`書上 = recognition｜片語 in acknowledgement of = 為表彰/感謝…｜英式 acknowledgement／美式 acknowledgment（少一個 e）｜動詞 acknowledge 承認`},
  {id:"h342",en:"acne",ipa:"/ˋæknɪ/",pos:"n. (U)",u:"HW3",zh:"青春痘、粉刺",def:`a skin condition that causes spots, common in young people`,eg:`Teenagers are prone to suffer from acne.（青少年都免不了要長惱人的粉刺）`,eg2:`I get acne whenever I'm stressed.`,syn:`書上例句片語 be prone to = 易於…、動不動就…（很實用的片語）｜不可數`},
  {id:"h343",en:"acquisition",ipa:"/͵ækwəˋzɪʃən/",pos:"n. (C, U)",u:"HW3",zh:"購得物、收購；(語言)習得",def:`something you buy or obtain; the process of gaining a skill or knowledge`,eg:`The money will be spent on acquisitions for the laboratory.（這筆款子將花在為實驗室添置設備上）／ I am interested in first language acquisition.（我對第一語言習得感興趣）`,eg2:`My latest acquisition is a second-hand bike.`,syn:`書上 * acquire (vt) 取得、* acquisitive (adj) 想佔有的｜書上同尾字 inquisition (探究)、requisition (購求；徵收)｜⚠️ 兩義：(C)購得物/收購 vs (U)習得(language acquisition)`},
  {id:"h344",en:"activist",ipa:"/ˋæktɪvɪst/",pos:"n. (C)",u:"HW3",zh:"積極分子、社運人士",def:`a person who works to bring about political or social change`,eg:`Greenpeace activists staged a demonstration against the construction of another nuclear power plant.（綠色和平運動的積極分子為反對修建另一座核電廠組織了一次示威遊行）`,eg2:`She's an activist for animal rights.`,syn:`書上例句片語 stage a demonstration = 舉行示威（stage 當動詞＝發動/舉辦）｜字根 act 行動 + -ivist 人｜相關 activism 行動主義`},
  {id:"h345",en:"acute",ipa:"/əˋkjut/",pos:"adj.",u:"HW3",zh:"劇烈的；敏銳的；急性的",def:`severe or intense; very sensitive; (of illness) starting quickly and severe`,eg:`Jack suffers acute pain in his back.（劇痛）／ Tina has an acute sense of smell.（敏銳的嗅覺）／ Chris has an acute attack of hepatitis.（急性肝炎）`,eg2:`I felt an acute pain in my knee when I stood up.`,syn:`書上 = severe, intense（劇烈）／= keen, sharp（敏銳）／⇔ chronic（慢性的）｜⚠️ 三個意思看搭配：acute pain 劇痛、acute sense 敏銳、acute hepatitis 急性肝炎`},
  {id:"h346",en:"adaptation",ipa:"/͵ædəpˋteʃən/",pos:"n. (U, C)",u:"HW3",zh:"適應；改編本",def:`the process of changing to suit new conditions; a film/book changed from another form`,eg:`The students' adaptation to the new school was easy and quick.（學生在新學校不知不覺很快就適應了）／ The movie is an adaptation of a novel.（這部影片是小說改編本）`,eg2:`The film is an adaptation of a comic book.`,syn:`書上 * adapt (vt) 適應/改編、* adaptable (adj) 適應力強的｜⚠️ 兩義：(U)適應 adaptation to sth vs (C)改編本 an adaptation of sth｜⚠️ 別跟 adopt(採用) 混（Day16 g29 學過）`},
  {id:"h347",sp:[{label:"名詞 /ˋædɪkt/ an addict",text:"He is an addict."},{label:"動詞 /əˋdɪkt/ to addict",text:"It can addict you quickly."}],en:"addict",ipa:"/ˋædɪkt/",pos:"n. (C)",u:"HW3",zh:"入迷者、成癮者",def:`a person who cannot stop doing or taking something`,eg:`Bob is a television addict.（鮑勃是個電視迷）`,eg2:`My brother is a total coffee addict.`,syn:`書上同尾字（-dict＝說）：indict 控告、predict 預測、edict 敕令、verdict 判決、contradict 反駁/矛盾、interdict 禁令｜⚠️ 名詞 addict 重音在前 /ˋædɪkt/；動詞 addict 重音在後 /əˋdɪkt/`},
  {id:"h348",en:"addicted",ipa:"/əˋdɪktɪd/",pos:"adj.",u:"HW3",zh:"上癮的、著迷的",def:`unable to stop taking or doing something`,eg:`He became addicted to drugs/alcohol/gambling.（他吸毒/酗酒/賭博上了癮）／ He is hopelessly addicted to television.（他無法自拔地耽溺看電視）`,eg2:`I'm addicted to this game — I've played it every night this week.`,syn:`書上 * addictive (adj) 使人上癮的｜⚠️ 固定用法 be/become addicted TO + 名詞/V-ing（to 是介係詞！）`},
  {id:"h349",en:"addiction",ipa:"/əˋdɪkʃən/",pos:"n. (C, U)",u:"HW3",zh:"癮、沉溺",def:`the condition of being unable to stop taking or doing something`,eg:`There is a growing problem of drug addiction among young people.（青少年吸毒成癮的人數日增）`,eg2:`He's getting help for his gambling addiction.`,syn:`搭配 drug/alcohol/gambling addiction；addiction to sth｜同家族 addict(人/動詞)、addicted(形)、addictive(使人上癮的)`},
  {id:"h350",en:"administer",ipa:"/ədˋmɪnəstɚ/",pos:"v. (vt)",u:"HW3",zh:"管理；施行、給予(藥物)",def:`to manage or organise; to give (medicine or treatment)`,eg:`The school has been badly administered.（該校管理無方）／ The doctor administered several aspirin for my headache.（醫生給我為頭痛服了幾片阿斯匹靈）`,eg2:`The test was administered to all new students.`,syn:`書上 = manage, run, govern；* administrator (C) 管理者｜⚠️ 兩義：①管理 ②施予(藥物/測驗/懲罰)——文中「給藥」是很常見的醫療用法`},
  {id:"h351",en:"administration",ipa:"/əd͵mɪnəˋstreʃən/",pos:"n. (U, C)",u:"HW3",zh:"管理、行政；(美)政府",def:`the management of a company or organisation; the government of a country (esp. US)`,eg:`Tim lacks experience in administration, so he cannot run the department.（提姆缺少管理經驗，因此他無法經營那個部門）／ The Reagan administration saw the end of communism in the Soviet Union.（雷根政府目睹了蘇聯共產主義的終結）`,eg2:`She works in hospital administration.`,syn:`⚠️ 兩義：(U)管理/行政 vs (C)政府/任期——美國常用 the Biden administration＝拜登政府（英式用 government）`},
  {id:"h352",en:"administrative",ipa:"/ədˋmɪnə͵stretɪv/",pos:"adj.",u:"HW3",zh:"管理的、行政的",def:`relating to the organising and management of work`,eg:`Jason took on an administrative job.（傑生接受了一份管理工作）`,eg2:`Most of my day is taken up by administrative tasks.`,syn:`搭配 administrative work/job/staff/costs｜書上例句片語 take on = 接下(工作/責任)`},
  {id:"h353",en:"admiral",ipa:"/ˋædmərəl/",pos:"n. (C)",u:"HW3",zh:"海軍上將",def:`an officer of very high rank in the navy`,eg:`Admiral Nelson defeated the combined French and Spanish fleets.（納爾遜海軍上將擊潰法國和西班牙聯合艦隊）`,eg2:`The museum has a painting of a famous admiral.`,syn:`書上例句字彙 fleet 艦隊、combined 聯合的｜⚠️ 別跟 admire(欽佩)、admirable(令人欽佩的) 混——長得像但無關`},
  {id:"h354",en:"adolescence",ipa:"/͵ædlˋɛsns/",pos:"n. (U)",u:"HW3",zh:"青春期",def:`the period between being a child and an adult`,eg:`Everyone will go through adolescence.（每個人都會經歷青春期）`,eg2:`I was painfully shy during adolescence.`,syn:`書上例句片語 go through = 經歷｜⇔ 名詞 adolescent 是「青少年」(人)，adolescence 是「青春期」(時期)——差在字尾 -ce(狀態) vs -t(人)`},
  {id:"h355",en:"adolescent",ipa:"/͵ædlˋɛsnt/",pos:"adj. / n. (C)",u:"HW3",zh:"青春期的；青少年",def:`relating to young people between child and adult; a young person of that age`,eg:`Adolescent behavior is not acceptable in an adult.（成年人表現出孩子氣的行為就不能為別人所接受了）／ Adolescents face a great deal of peer pressure.（青少年面對來自同儕的巨大壓力）`,eg2:`Adolescents need more sleep than adults think.`,syn:`書上 = juvenile（青少年的）｜書上例句字彙 peer pressure 同儕壓力｜⚠️ 形容詞也帶「幼稚、孩子氣」的貶意（如書上例句）`},
  {id:"h356",en:"adore",ipa:"/əˋdor/",pos:"v. (vt)",u:"HW3",zh:"非常喜愛、崇拜",def:`to love someone very much; to like something very much`,eg:`Serena adores her children.（莎琳娜溺愛自己的孩子們）／ Paul adores going to the movies.（保羅非常喜歡看電影）`,eg2:`My niece adores that cartoon — she watches it on repeat.`,syn:`書上 = love very much｜⚠️ adore 接 V-ing 不接 to V（adores going ✓）｜語氣比 like 強很多；也可指宗教上的「崇拜」`},
  {id:"h357",en:"adulthood",ipa:"/əˋdʌlthʊd/",pos:"n. (U)",u:"HW3",zh:"成年（期）",def:`the time when you are an adult`,eg:`A child will reach adulthood at the age of twenty.（孩子長到二十歲就算成年了）`,eg2:`Many people move out when they reach adulthood.`,syn:`書上 ⇔ childhood 童年；* adult (adj, C)｜字尾 -hood＝時期/身分（childhood、motherhood、neighbourhood）｜片語 reach adulthood`},
  {id:"h358",sp:[{label:"名詞 /ˋædvəkɪt/ an advocate",text:"She is an advocate."},{label:"動詞 /ˋædvə͵ket/ to advocate",text:"They advocate reform."}],en:"advocate",ipa:"/ˋædvə͵ket/ (v) ／ /ˋædvəkɪt/ (n)",pos:"v. (vt) / n. (C)",u:"HW3",zh:"提倡、主張；倡導者",def:`to publicly support an idea; a person who supports an idea`,eg:`Some businessmen advocate cutting interest rates.（一些商人主張降低利率）`,eg2:`She advocates working from home two days a week.`,syn:`書上 = support；* advocate (C) 倡導者｜⚠️ 重音移動：動詞 /ˋædvə͵ket/ 尾音 -keɪt；名詞 /ˋædvəkɪt/ 尾音輕｜⚠️ advocate 接 V-ing 或名詞，不接 to V｜📌 此字 HW2 也出現過（Slow Travel 文章），兩批都會複習到`},
  {id:"h359",en:"affection",ipa:"/əˋfɛkʃən/",pos:"n. (U)",u:"HW3",zh:"喜愛、情感",def:`a feeling of liking and caring for someone`,eg:`Andy has a deep affection for his daughter.（安迪深愛自己的女兒）`,eg2:`He talks about his hometown with real affection.`,syn:`書上 = fondness｜書上同尾字 infection (傳染)、perfection (完美)、confection (甜食)、defection (叛變)｜搭配 affection for sb`},
  {id:"h360",en:"affectionate",ipa:"/əˋfɛkʃənɪt/",pos:"adj.",u:"HW3",zh:"充滿情感的、親暱的",def:`showing feelings of liking or love`,eg:`He is very affectionate to his daughter.（他對女兒很有感情）`,eg2:`Our dog is very affectionate with strangers.`,syn:`書上 = attached（有感情的）｜副詞 affectionately｜搭配 affectionate to/towards sb`},
  {id:"h361",en:"affirm",ipa:"/əˋfɝm/",pos:"v. (vt)",u:"HW3",zh:"斷言、證實",def:`to state something is true`,eg:`Jim affirmed that he was telling the truth.（吉姆鄭重聲明他說的是實話）`,eg2:`The company affirmed that no jobs would be cut.`,syn:`書上 = assert, declare；* affirmative (adj) 肯定的｜⇔ deny 否認｜正式用字，常見於法律/官方聲明`},
  {id:"h362",en:"agenda",ipa:"/əˋdʒɛndə/",pos:"n. (C)",u:"HW3",zh:"議程；待辦優先事項",def:`a list of things to be discussed at a meeting; the important things someone wants to achieve`,eg:`Educational reforms are high/low on the agenda.（教育改革是重要議題／不重要議題）`,eg2:`What's on the agenda for today's meeting?`,syn:`⚠️ 書上例句是很實用的片語：be high/low ON THE agenda = （議題）重要/不重要｜也有引申義 a hidden agenda 別有用心的盤算`},
  {id:"h363",en:"aggression",ipa:"/əˋgrɛʃən/",pos:"n. (U)",u:"HW3",zh:"侵略；攻擊性",def:`violent action against another country; angry or violent behaviour`,eg:`Iraq once committed armed aggression against Kuwait, but its naked aggression was repelled by the U.S.（伊拉克曾對科威特進行武裝侵略，但其赤裸裸的侵略行為遭到美國的反擊）`,eg2:`The dog showed no aggression at all.`,syn:`書上例句字彙 armed aggression 武裝侵略、naked aggression 赤裸裸的侵略、repel 擊退｜搭配 aggression against sb`},
  {id:"h364",en:"aggressive",ipa:"/əˋgrɛsɪv/",pos:"adj.",u:"HW3",zh:"好鬥的；積極進取的",def:`behaving in an angry, threatening way; determined and forceful`,eg:`Bob's aggressive behavior often causes problems.（鮑勃的好鬥行為常常惹來麻煩）／ John is aggressive, so he can get ahead in his job.（約翰有進取心，因而能在工作中步步上進）`,eg2:`Their sales team is very aggressive.`,syn:`書上 = boldly assertive（大膽果決）｜書上例句片語 get ahead = 出人頭地｜⚠️ 兩面性：可褒(積極進取)可貶(好鬥)——看語境判斷，這是這個字的關鍵`},
  {id:"h365",en:"agitate",ipa:"/ˋædʒə͵tet/",pos:"v. (vt)",u:"HW3",zh:"使焦慮不安；鼓動",def:`to make someone anxious or upset; to argue strongly for change`,eg:`Jane became agitated when she was asked about her past.（珍被問到她的過去就顯得焦躁不安）`,eg2:`Don't agitate him — he's already nervous about the exam.`,syn:`書上 * agitation (U) 焦慮/鼓動｜常見被動 become/be agitated = 焦躁不安｜另有「鼓動群眾」義：agitate for reform`},
  {id:"h366",en:"agony",ipa:"/ˋægənɪ/",pos:"n. (U)",u:"HW3",zh:"極度痛苦",def:`extreme physical or mental pain`,eg:`Mary lay in agony waiting for her doctor to come.（瑪莉非常痛苦地躺著等醫生來）`,eg2:`I was in agony after twisting my ankle.`,syn:`書上 = distress, pain；* agonize (vi) 感到極度痛苦｜片語 in agony = 痛苦不堪｜⚠️ 比 pain 強烈得多——是「痛到不行」`},
  {id:"h367",en:"agreeable",ipa:"/əˋgriəbl/",pos:"adj.",u:"HW3",zh:"令人愉快的；可接受的、欣然同意的",def:`pleasant; acceptable or willing to agree`,eg:`I found an agreeable spot for camping.（我找到了一塊宜人的野營地）／ Any deal must be agreeable to everyone involved.（任何一項要達成的協議都必須人人都同意）`,eg2:`We finally found a time that was agreeable to everyone.`,syn:`書上 = pleasant（宜人的）／= acceptable（可接受的）｜⚠️ 兩義看搭配：an agreeable spot（宜人）vs agreeable to sb（某人可接受/同意）`},
  {id:"h368",en:"agricultural",ipa:"/͵ægrɪˋkʌltʃərəl/",pos:"adj.",u:"HW3",zh:"農業的",def:`relating to farming`,eg:`Most of the country's agricultural products are exported to the U.S.（該國大部分的農業產品出口到美國）`,eg2:`This region is mainly agricultural.`,syn:`書上 = agriculture (U) 農業｜書上同尾字 agrarian (土地的)、agronomy (農藝學)、agribusiness (農業綜合企業)、agronomist (農學家)｜字根 agri-＝田地`},
  {id:"h369",en:"artificial intelligence",ipa:"/͵ɑrtəˋfɪʃəl ɪnˋtɛlədʒəns/",pos:"n. (U)",u:"HW3",zh:"人工智慧（AI）",def:`computer systems that can perform tasks normally needing human intelligence`,eg:`Artificial intelligence is changing how we work.（人工智慧正在改變我們的工作方式）`,eg2:`My phone uses artificial intelligence to sort my photos.`,syn:`縮寫 AI｜拆解 artificial 人造的、人工的（⇔ natural）+ intelligence 智慧、情報｜⚠️ artificial 也有「虛假的」貶義：an artificial smile 假笑`},
  {id:"h370",en:"airtight",ipa:"/ˋɛr͵taɪt/",pos:"adj.",u:"HW3",zh:"密閉的、不透氣的",def:`closed so tightly that no air can get in or out`,eg:`Store food in an airtight container, otherwise, it will go bad easily.（把食物存在密封的容器內，不然很快就要變質）`,eg2:`Keep the coffee beans in an airtight jar.`,syn:`拆解 air 空氣 + tight 緊密的｜⚠️ 比喻用法很實用：an airtight alibi/argument = 無懈可擊的不在場證明/論點`},
  {id:"h371",en:"airway",ipa:"/ˋɛr͵we/",pos:"n. (C)",u:"HW3",zh:"呼吸道；航線、航空公司",def:`the passage in your throat for breathing; a route used by aircraft`,eg:`The doctor checked my airway.（醫生檢查了我的呼吸道）／ British Airways made big losses last year.（英國航空公司去年出現巨額虧損）`,eg2:`Keep the baby's airway clear.`,syn:`書上 = airline（航空公司）｜⚠️ 兩義：呼吸道(醫學) vs 航空公司(常見於公司名，如 British Airways)`},
  {id:"h372",en:"aisle",ipa:"/aɪl/",pos:"n. (C)",u:"HW3",zh:"走道、通道",def:`a long narrow space between rows of seats or shelves`,eg:`Instant noodles are in the next aisle.（速食麵陳列在隔壁的貨架上）`,eg2:`Excuse me, which aisle has the milk?`,syn:`⚠️⚠️ 發音陷阱：aisle /aɪl/ ——**s 不發音**！跟 isle(小島)、I'll 同音｜常見 an aisle seat 走道座位；walk down the aisle 走紅毯(結婚)`},
  {id:"h373",en:"alcohol",ipa:"/ˋælkə͵hɔl/",pos:"n. (U)",u:"HW3",zh:"酒精、酒",def:`a drink that can make people drunk; the substance in such drinks`,eg:`It would be better for you to keep off alcohol.（你最好滴酒不沾）`,eg2:`I don't drink alcohol on weeknights.`,syn:`書上例句片語 keep off = 遠離、不碰（keep off alcohol/sugar）｜書上相關字 liquor (烈性酒)、spirits (烈性酒)、wine (葡萄酒)、booze (酒，口語)`},
  {id:"h374",en:"alcoholic",ipa:"/͵ælkəˋhɔlɪk/",pos:"adj. / n. (C)",u:"HW3",zh:"含酒精的；酗酒者",def:`containing alcohol; a person who cannot stop drinking alcohol`,eg:`They left the restaurant in an alcoholic haze.（他們醉眼朦朧地離開了飯店）／ An alcoholic is often in a state of permanent depression.（酗酒者常常陷入持續的沮喪狀態中）`,eg2:`Is there a non-alcoholic option?`,syn:`書上同尾字 workaholic (工作狂)｜⚠️ 兩種詞性差很多：形容詞＝含酒精的（an alcoholic drink）／名詞＝酗酒者（an alcoholic）`},
  {id:"h375",en:"algebra",ipa:"/ˋældʒəbrə/",pos:"n. (U)",u:"HW3",zh:"代數",def:`a type of mathematics using letters to represent numbers`,eg:`Business and industry rely on algebra to help solve many problems.（商業和工業依賴代數解決很多問題）`,eg2:`I was never any good at algebra.`,syn:`不可數｜形容詞 algebraic｜字源來自阿拉伯文 al-jabr`},
  {id:"h376",en:"alien",ipa:"/ˋelɪən/",pos:"adj. / n. (C)",u:"HW3",zh:"外國的、陌生的；外星人、外僑",def:`strange and unfamiliar; foreign; a creature from another planet or a foreigner`,eg:`Your ideas are quite alien to my way of thinking.（你的觀念與我的思路截然不同）／ I am interested in alien customs/cultures.（我對異國習俗/文化感興趣）／ Since the terrorist attack, illegal aliens have been hunted down and deported.（自從恐怖分子襲擊後，非法居留的外僑被搜捕出並遣送出境）`,eg2:`The whole system felt alien to me at first.`,syn:`書上 = foreign（外國的）／= foreigner（外僑）｜⚠️ 片語 be alien to sb = 對某人而言很陌生/格格不入｜illegal alien 非法外僑（法律用語）｜口語最常見的意思其實是「外星人」`},
  {id:"h377",en:"alienate",ipa:"/ˋeljən͵et/",pos:"v. (vt)",u:"HW3",zh:"使疏遠、使不再支持",def:`to make someone stop being friendly or supportive`,eg:`By raising taxes, the president alienated many voters.（總統提高稅收使得許多選民不再支持他）`,eg2:`His constant complaining alienated his teammates.`,syn:`字根 alien(陌生的) + -ate(使…)＝使變陌生→疏遠｜常見 alienate sb（讓某人離心離德）`},
  {id:"h378",en:"alienation",ipa:"/͵eljənˋeʃən/",pos:"n. (U)",u:"HW3",zh:"疏離感、格格不入",def:`the feeling of not belonging or being separated from others`,eg:`Students who are alienated from normal school life are likely to be led astray.（脫離正常學校生活的學生很有可能會走入歧途）／ A newcomer to the city often feels a sense of alienation.（城市裡的新來者常常會感到一種疏離感）`,eg2:`Working from home can lead to a sense of alienation.`,syn:`書上例句片語 be alienated from = 與…疏離／be led astray = 誤入歧途｜片語 a sense of alienation 疏離感`},
  {id:"h379",en:"allegation",ipa:"/͵æləˋgeʃən/",pos:"n. (C)",u:"HW3",zh:"指控（未經證實）",def:`a statement, made without proof, that someone has done something wrong`,eg:`If the allegations against him prove correct, he will face a criminal charge.（假如對他的指控證明是正確的，他將面臨犯罪起訴）`,eg2:`He denied all the allegations.`,syn:`書上例句字彙 criminal charge 刑事起訴｜⚠️ 關鍵：allegation 是「未經證實」的指控｜📌 此字 HW3 文章批（h326）也有，兩邊會一起複習`},
  {id:"h380",en:"allege",ipa:"/əˋlɛdʒ/",pos:"v. (vt)",u:"HW3",zh:"聲稱、指控（未提證據）",def:`to say that someone has done something wrong, without giving proof`,eg:`He is alleged to have passed on secret information to the enemy.（他被指控向敵人傳送機密情報）`,eg2:`The report alleges that the company hid the losses.`,syn:`書上例句句型 be alleged to have + p.p. = 被指控曾經…｜衍生 alleged (adj) 被指控的、allegedly (adv) 據稱｜⚠️ 新聞愛用，因為可避免斷定`},
  {id:"h381",en:"allergic",ipa:"/əˋlɝdʒɪk/",pos:"adj.",u:"HW3",zh:"過敏的",def:`having an allergy; caused by an allergy`,eg:`Some people are allergic to pollen.（有些人對花粉過敏）`,eg2:`I'm allergic to cats — my eyes swell up.`,syn:`⚠️ 固定用法 be allergic TO sth｜書上例句字彙 pollen 花粉｜口語引申：I'm allergic to Mondays.（我對星期一過敏＝超討厭）`},
  {id:"h382",en:"allergy",ipa:"/ˋælɚdʒɪ/",pos:"n. (C)",u:"HW3",zh:"過敏症",def:`a condition that makes you ill when you eat, touch, or breathe something`,eg:`I suffer from an allergy to sea food.（我對海鮮過敏）`,eg2:`She has a peanut allergy.`,syn:`⚠️ 名詞 allergy /ˋælɚdʒɪ/ 重音在前 vs 形容詞 allergic /əˋlɝdʒɪk/ 重音在後——重音位置會移動！｜片語 an allergy to sth`},
  {id:"h383",en:"alleviate",ipa:"/əˋlivɪ͵et/",pos:"v. (vt)",u:"HW3",zh:"減輕、緩和",def:`to make pain or problems less severe`,eg:`We tried to alleviate the pain/boredom by singing songs.（我們試圖以唱歌來減輕痛苦/打發無聊）`,eg2:`A hot bath alleviated the ache in my shoulders.`,syn:`書上 = ease, relieve；* alleviation (U)｜受詞通常是「不好的東西」：alleviate pain/suffering/poverty/pressure｜📌 跟 HW3 文章的 ameliorate(改善狀況) 很近：alleviate 偏「減輕痛苦」，ameliorate 偏「改善情況」`},
  {id:"h384",en:"alliance",ipa:"/əˋlaɪəns/",pos:"n. (C)",u:"HW3",zh:"聯盟、同盟",def:`an agreement between countries or groups to work together`,eg:`Several Eastern European countries have entered into a defensive alliance with NATO.（幾個東歐國家已加入了與北大西洋公約組織共同攜手的防禦同盟）`,eg2:`The two parties formed an alliance before the election.`,syn:`書上 = league｜書上例句片語 enter into an alliance with = 與…結盟｜同家族 ally(盟友/結盟)、allied(結盟的)`},
  {id:"h385",en:"alligator",ipa:"/ˋælə͵getɚ/",pos:"n. (C)",u:"HW3",zh:"短吻鱷",def:`a large reptile with a long body and sharp teeth, similar to a crocodile`,eg:`Alligators resemble lizards in their shape, but they have thicker bodies and tails than most lizards.（短吻鱷形狀像蜥蜴，但身體和尾巴比大部分的蜥蜴還粗）`,eg2:`We saw an alligator at the wildlife park.`,syn:`書上 = crocodile（鱷魚）｜書上例句字彙 resemble 像、lizard 蜥蜴｜⚠️ alligator 吻部較短較圓；crocodile 吻部尖長——嚴格說不同動物`},
  {id:"h386",en:"allocate",ipa:"/ˋælə͵ket/",pos:"v. (vt)",u:"HW3",zh:"分配、撥出",def:`to give something to someone as their share, especially money or time`,eg:`Ten million dollars have been allocated for building a new school in this area.（已撥出一千萬美元在此區建造一所新學校）`,eg2:`We've allocated two hours for the meeting.`,syn:`書上 = earmark, set aside；* allocation (U, C) 分配(額)｜句型 allocate sth FOR sth／allocate sth TO sb｜正式用字，常見於預算/資源`},
  {id:"h387",sp:[{label:"名詞 /ˋælaɪ/ an ally",text:"He is an ally."},{label:"動詞 /əˋlaɪ/ to ally",text:"They ally themselves with us."}],en:"ally",ipa:"/ˋælaɪ/ (n) ／ /əˋlaɪ/ (v)",pos:"n. (C) / v. (vt)",u:"HW3",zh:"盟友；結盟",def:`a country or person that helps and supports another; to join with someone for support`,eg:`A small country tends to ally itself with a stronger power.（小國一般都要與一強國結盟）／ The U.S. fought against Iraq with the help of its European allies.（美國在其歐洲盟國的協助下與伊拉克作戰）`,eg2:`She's been a real ally at work.`,syn:`書上 = align；書上同尾字 locate (找出)、dislocate (脫臼)、relocate (遷移)｜⚠️ 重音移動：名詞 /ˋælaɪ/ 前重音 vs 動詞 /əˋlaɪ/ 後重音｜複數 allies；片語 ally oneself with`},
  {id:"h388",en:"alongside",ipa:"/əˋlɔŋˋsaɪd/",pos:"prep.",u:"HW3",zh:"在…旁邊；與…一起(共事)",def:`next to something; together with someone`,eg:`Britain fought alongside America during World War II.（第二次世界大戰中，英國與美國並肩作戰）`,eg2:`I've worked alongside her for three years.`,syn:`拆解 along 沿著 + side 邊｜⚠️ 引申義超常用：work alongside sb = 與某人共事（不只是「站旁邊」）`},
  {id:"h389",en:"alter",ipa:"/ˋɔltɚ/",pos:"v. (vt)",u:"HW3",zh:"改變、修改",def:`to change something, usually slightly`,eg:`The coat has to be altered; it is too large.（外套要修改一下，太大了）`,eg2:`I had to alter my plans at the last minute.`,syn:`書上 = change｜⚠️ 語感：alter 多指「小幅修改」（衣服改尺寸、計畫微調），change 是通用的「改變」｜⚠️ 別跟 altar(祭壇) 混，同音不同字`},
  {id:"h390",en:"alteration",ipa:"/͵ɔltəˋreʃən/",pos:"n. (C, U)",u:"HW3",zh:"改變、修改",def:`a change, usually small; the process of changing something`,eg:`I am planning to make a few alterations to my house.（我正打算把自己的住屋作些改動）／ My coat needs alteration.（我的外套要修改）`,eg2:`The dress needs a few alterations before the wedding.`,syn:`書上 = change｜片語 make alterations to sth｜⚠️ 服飾業常用：alterations＝修改衣服（店家招牌常見）`},
  {id:"h391",sp:[{label:"形容詞 /ˋɔltɚnɪt/ alternate",text:"I work on alternate days."},{label:"動詞 /ˋɔltɚ͵net/ to alternate",text:"They alternate between them."}],en:"alternate",ipa:"/ˋɔltɚnɪt/ (adj) ／ /ˋɔltɚ͵net/ (v)",pos:"adj. / v. (vi)",u:"HW3",zh:"輪流的、間隔的；交替",def:`happening one after the other in a regular pattern; to happen in turn`,eg:`I work on alternate Saturdays.（我隔週六工作）／ The weather alternates between rain and sunshine.（天氣時雨時晴）`,eg2:`We take alternate turns driving on long trips.`,syn:`⚠️ 重音/尾音移動：形容詞 /ˋɔltɚnɪt/ 尾音輕 vs 動詞 /ˋɔltɚ͵net/ 尾音 -neɪt｜⚠️ alternate Saturdays＝隔週的週六（不是「所有週六」）｜片語 alternate between A and B`},
  {id:"h392",en:"alternative",ipa:"/ɔlˋtɝnətɪv/",pos:"adj. / n. (C)",u:"HW3",zh:"替代的；選擇、替代方案",def:`available as another possibility; something you can choose instead`,eg:`They went by the alternative road.（他們另選了一條路走）／ The only alternative to being captured is to die fighting.（除了當俘虜外，唯一的選擇就是戰死）`,eg2:`Is there a vegetarian alternative?`,syn:`書上 = substitute (for)；* alternatively (adv) 或者｜⚠️ 句型 an alternative TO sth（不是 of）｜⚠️ 跟 alternate 只差字尾但意思不同：alternative＝替代選擇；alternate＝輪流交替`},
  {id:"h393",en:"altitude",ipa:"/ˋæltə͵tjud/",pos:"n.",u:"HW3",zh:"高度、海拔",def:`the height of something above sea level`,eg:`The plane is flying at an altitude of 50,000 feet.（飛機正飛在五萬英尺高空）`,eg2:`You may feel dizzy at high altitude.`,syn:`書上 = elevation｜書上同尾字（-tude＝狀態/性質）：attitude (態度)、aptitude (才能；性向)、latitude (緯度)、multitude (大量)、platitude (老生常談)、rectitude (正直)、fortitude (堅忍)、gratitude (感謝)、certitude (確定)、longitude (經度)、magnitude (巨大)、ineptitude (笨拙)、vicissitudes (個人狀況；興衰)｜⚠️ 片語 at an altitude of + 數字`},
  {id:"h394",en:"ambiguity",ipa:"/͵æmbɪˋgjuətɪ/",pos:"n. (U)",u:"HW3",zh:"模稜兩可、含糊不清",def:`the state of having more than one possible meaning`,eg:`In order to avoid ambiguity, you should write clearly.（為避免意義含糊，你寫作時應明白清晰）`,eg2:`The wording left some ambiguity about the deadline.`,syn:`書上 = vagueness｜形容詞 ambiguous 模稜兩可的｜⚠️ 辨析 ambiguous(可有多種解讀，語意不明) vs vague(籠統、不具體)——很近但不同`},



  // Crime & Safety（音標為 IPA）
  {id:"c01",en:"escape",ipa:"/ɪˈskeɪp/",pos:"v.",u:"Crime",zh:"逃跑；逃脫",def:`to get away from a place or situation`,eg:`The prisoner escaped through a window.`,syn:`搭配 escape from prison, narrow escape`},
  {id:"c02",en:"spot",ipa:"/spɒt/",pos:"v.",u:"Crime",zh:"發現；看見",def:`to notice or see something`,eg:`An officer spotted the stolen car near the station.`,syn:`搭配 spot a problem, spot the difference`},
  {id:"c03",en:"uniform",ipa:"/ˈjuː.nɪ.fɔːm/",pos:"n.",u:"Crime",zh:"制服",def:`the special clothes worn by police, military, etc.`,eg:`You can always recognise police by their uniform.`,syn:`搭配 police uniform, wear a uniform`},
  {id:"c04",en:"neighborhood",ipa:"/ˈneɪ.bə.hʊd/",pos:"n.",u:"Crime",zh:"鄰近地區；社區",def:`the area around where you live`,eg:`The police work closely with the local neighborhood.`,syn:`搭配 local / safe neighborhood`},
  {id:"c05",en:"record",ipa:"/ˈrek.ɔːd/ (n) /rɪˈkɔːd/ (v)",pos:"n./v.",u:"Crime",zh:"記錄；檔案",def:`official information kept about someone; to write down information`,eg:`He has a criminal record for shoplifting.`,syn:`搭配 criminal record, keep a record`},
  {id:"c06",en:"trust",ipa:"/trʌst/",pos:"v./n.",u:"Crime",zh:"信任",def:`to believe that someone is honest and will not harm you`,eg:`Communities need to trust their local police.`,syn:`搭配 build trust, gain trust`},
  {id:"c07",en:"speed",ipa:"/spiːd/",pos:"v./n.",u:"Crime",zh:"超速；速度",def:`to move too fast, especially in a vehicle`,eg:`He was caught speeding on the motorway.`,syn:`搭配 speeding ticket, speed limit`},
  {id:"c08",en:"drunk",ipa:"/drʌŋk/",pos:"adj.",u:"Crime",zh:"醉酒的",def:`having had too much alcohol`,eg:`Drunk drivers are a serious danger on the road.`,syn:`搭配 drink and drive, drunk driving`},
  {id:"c09",en:"cooperate",ipa:"/kəʊˈɒp.ər.eɪt/",pos:"v.",u:"Crime",zh:"配合；合作",def:`to work together or help someone`,eg:`Please cooperate with the police investigation.`,syn:`搭配 cooperate with, cooperate fully`},
  {id:"c10",en:"public",ipa:"/ˈpʌb.lɪk/",pos:"adj./n.",u:"Crime",zh:"公共的；大眾",def:`relating to all people in a community`,eg:`The police are there to serve the public.`,syn:`搭配 public safety, the general public`},
  {id:"c11",en:"force",ipa:"/fɔːs/",pos:"n.",u:"Crime",zh:"武力；警力",def:`physical strength or power; a group of people`,eg:`The police should only use force when necessary.`,syn:`搭配 police force, use of force`},

  // Arts & Culture（音標為 IPA）
  {id:"a01",en:"creative",ipa:"/kriˈeɪ.tɪv/",pos:"adj.",u:"Arts",zh:"有創意的；創造性的",def:`able to make new and interesting things`,eg:`She is a very creative artist who uses unusual materials.`,syn:`搭配 creative writing, creative person`},
  {id:"a02",en:"exhibit",ipa:"/ɪɡˈzɪb.ɪt/",pos:"v./n.",u:"Arts",zh:"展覽；展示",def:`to show something in a public place; a display`,eg:`The gallery is exhibiting new works by local artists.`,syn:`搭配 art exhibit, exhibit at a gallery`},
  {id:"a03",en:"artistic",ipa:"/ɑːˈtɪs.tɪk/",pos:"adj.",u:"Arts",zh:"藝術的；有藝術才能的",def:`relating to art or showing skill in art`,eg:`She has a very artistic eye for colour and design.`,syn:`搭配 artistic style, artistic talent`},
  {id:"a04",en:"audience",ipa:"/ˈɔː.di.əns/",pos:"n.",u:"Arts",zh:"觀眾；聽眾",def:`people watching or listening to a performance`,eg:`The audience clapped loudly at the end of the show.`,syn:`搭配 large audience, live audience`},
  {id:"a05",en:"performance",ipa:"/pəˈfɔː.məns/",pos:"n.",u:"Arts",zh:"表演；演出",def:`the act of entertaining people by singing, playing, acting, etc.`,eg:`The dance performance lasted two hours.`,syn:`搭配 live performance, give a performance`},
  {id:"a06",en:"inspire",ipa:"/ɪnˈspaɪər/",pos:"v.",u:"Arts",zh:"啟發；激勵",def:`to make someone feel they want to do or create something`,eg:`The film inspired her to start painting.`,syn:`搭配 inspire someone to, feel inspired`},
  {id:"a07",en:"gallery",ipa:"/ˈɡæl.ər.i/",pos:"n.",u:"Arts",zh:"美術館；藝廊",def:`a building or room where art is shown`,eg:`We spent the afternoon in the art gallery.`,syn:`搭配 art gallery, visit a gallery`},
  {id:"a08",en:"portrait",ipa:"/ˈpɔː.trət/",pos:"n.",u:"Arts",zh:"肖像；人物畫",def:`a painting, drawing, or photograph of a person`,eg:`The gallery has many famous portraits.`,syn:`搭配 paint a portrait, self-portrait`},
  {id:"a09",en:"tradition",ipa:"/trəˈdɪʃ.ən/",pos:"n.",u:"Arts",zh:"傳統",def:`a way of doing something that has existed for a long time`,eg:`This festival is an important cultural tradition.`,syn:`搭配 local tradition, keep a tradition`},
  {id:"a10",en:"unique",ipa:"/juˈniːk/",pos:"adj.",u:"Arts",zh:"獨特的；唯一的",def:`being the only one of its kind; very special`,eg:`The artist has a very unique style.`,syn:`搭配 unique style, unique experience`},
  {id:"a11",en:"express",ipa:"/ɪkˈspres/",pos:"v.",u:"Arts",zh:"表達；表現",def:`to show what you think or feel through words, actions, or art`,eg:`Music is a great way to express your emotions.`,syn:`搭配 express yourself, express an opinion`},
  {id:"a12",en:"emotion",ipa:"/ɪˈməʊ.ʃən/",pos:"n.",u:"Arts",zh:"情感；情緒",def:`a strong feeling such as love, happiness, or sadness`,eg:`Her paintings are full of emotion.`,syn:`搭配 show emotion, strong emotion`},

  // Day 5 單字
  {id:"w101",en:"promise",ipa:"/ˈprɒm.ɪs/ (UK) /ˈprɑː.mɪs/ (US)",pos:"v./n.",u:"Day5",zh:"答應、承諾",def:`to tell someone you will definitely do something`,eg:`I promised her I would help her move.`,syn:`句型 promise sb (that)… / promise to do；間接引述 will→would`},
  {id:"w102",en:"attachment",ipa:"/əˈtætʃ.mənt/",pos:"n.",u:"Day5",zh:"附件；依附、依戀",def:`a file sent with an email`,eg:`Please find attached the minutes of the meeting.`,syn:`片語 please find attached / attached is/are = 附件是…（email 慣用）`},
  {id:"w103",en:"minutes",ipa:"/ˈmɪn.ɪts/",pos:"n. (pl.)",u:"Day5",zh:"會議紀錄",def:`an official written record of what is said and decided at a meeting`,eg:`Attached are the minutes of last week's meeting.`,syn:`此義恆為複數 minutes`},
  {id:"w104",en:"gross margin",ipa:"/ˌɡrəʊs ˈmɑː.dʒɪn/",pos:"n.",u:"Day5",zh:"毛利率",def:`a company's profit from selling goods or services before indirect costs`,eg:`The company's gross margin fell year-on-year.`,syn:`辨析 gross margin 毛利率 ≠ net margin 淨利率；profit margin 利潤率(泛)`},
  {id:"w105",en:"hiking",ipa:"/ˈhaɪ.kɪŋ/",pos:"n.",u:"Day5",zh:"健行、爬山",def:`the activity of walking in the countryside or mountains for pleasure`,eg:`We went hiking in the mountains last weekend.`,syn:`辨析 hiking 休閒走山 ≠ mountain climbing / mountaineering 攀登(技術性)；go hiking`},

  // Day 6 單字
  {id:"w201",en:"fab",ipa:"/fæb/",pos:"n.",u:"Day6",zh:"晶圓廠、半導體製造廠",def:`a factory for making advanced electronic products, such as semiconductor chips (short for fabrication plant)`,eg:`TSMC will build a new fab in the US.`,syn:`辨析 口語 fab 也可指 fabulous；業界幾乎都指晶圓廠`},
  {id:"w202",en:"announce",ipa:"/əˈnaʊns/",pos:"v.",u:"Day6",zh:"宣布、公告",def:`to tell people about something officially or publicly`,eg:`TSMC announced plans to build a new fab.`,syn:`片語 announce plans to do sth = 宣布計畫要…`},

  // Day 7 單字
  {id:"w301",en:"picnic",ipa:"/ˈpɪk.nɪk/",pos:"n.",u:"Day7",zh:"野餐",def:`an occasion when a meal is eaten outdoors, often in a park or countryside`,eg:`We invited them to a picnic in the park.`,syn:`辨析 picnic(白天出遊) ≠ camping(露營過夜)`},
  {id:"w302",en:"issue",ipa:"/ˈɪʃ.uː/",pos:"n.",u:"Day7",zh:"問題、狀況",def:`a problem or difficulty`,eg:`We are resolving the issue you reported.`,syn:`辨析 issue(問題、狀況) ≠ question(疑問句)`},
  {id:"w303",en:"inconvenience",ipa:"/ˌɪn.kənˈviː.ni.əns/",pos:"n.",u:"Day7",zh:"不便、麻煩",def:`a situation that causes trouble or difficulty`,eg:`We are sorry for the inconvenience this may have caused.`,syn:`片語 sorry for the inconvenience = 造成不便非常抱歉（用 the，非 your）`},
  {id:"w304",en:"ease",ipa:"/iːz/",pos:"v.",u:"Day7",zh:"（經濟數據）趨緩、放鬆",def:`to become less severe or intense`,eg:`Analysts expect inflation to ease in the coming months.`,syn:`同源 slowdown/slowing；財經常用來講通膨、壓力趨緩`},

  // Day 8 單字
  {id:"w401",en:"shortage",ipa:"/ˈʃɔː.tɪdʒ/",pos:"n.",u:"Day8",zh:"短缺、不足",def:`a situation in which there is not enough of something that is needed`,eg:`The industry is struggling with a severe labor shortage.`,syn:`片語 labor shortage = 缺工（Cambridge 收錄搭配詞）`,cam:"shortage"},
  {id:"w402",en:"labor costs",ipa:"/ˈleɪ.bər kɒst/",pos:"n.",u:"Day8",zh:"人力成本、勞動成本",def:`the cost of employing workers, including wages and benefits`,eg:`Labor costs in this industry have been rising in recent years.`,syn:`辨析 labor costs(人力成本) ≠ human resources(人資部門/概念)`},

  // Day 9 單字
  {id:"w501",en:"scroll through",ipa:"/skrəʊl θruː/",pos:"phr. v.",u:"Day9",zh:"滑（手機／頁面）、瀏覽",def:`to move through text or images on a screen by scrolling`,eg:`I ended up scrolling through my phone all day.`,syn:`辨析 ✗ play the phone 這個講法不存在，是中式直譯`},
  {id:"w502",en:"feedback",ipa:"/ˈfiːd.bæk/",pos:"n. (U)",u:"Day9",zh:"意見、回饋",def:`comments about how well something is working, given so it can be improved`,eg:`Please provide your feedback by Friday.`,syn:`辨析 feedback(針對特定事物的具體回饋) vs opinions(較個人籠統的看法)`},
  {id:"w503",en:"the Fed",ipa:"/ðə fed/",pos:"n.",u:"Day9",zh:"聯準會（美國中央銀行，正式名稱 the Federal Reserve）",def:`the central bank of the United States, responsible for setting US interest rates and monetary policy`,eg:`Tech stocks may see a rally if the Fed cuts rates.`,syn:`辨析 ⚠️ the Fed(美國央行,管美國利率) ≠ IMF(國際貨幣基金組織,管跨國金融穩定與貸款)，職責完全不同`},
  {id:"w504",en:"rally",ipa:"/ˈræl.i/",pos:"n./v.",u:"Day9",zh:"（股市）反彈、回升",def:`a sudden increase in share prices after a period when they have been falling`,eg:`Tech stocks may see a rally if the Fed cuts rates.`,syn:`搭配 a rally in shares/prices；stage/enjoy a rally`},

  // Day 10 單字
  {id:"w601",en:"performance",ipa:"/pəˈfɔː.məns/",pos:"n.",u:"Day10",zh:"效能、表現",def:`how well a person, machine, or organization does a piece of work or an activity`,eg:`The laptop's performance hasn't declined at all after two years of use.`,syn:`辨析 performance(效能、表現) vs efficiency(效率，資源使用得好不好，如省電)`},
  {id:"w602",en:"phenomenon",ipa:"/fəˈnɒm.ɪ.nən/",pos:"n.",u:"Day10",zh:"現象",def:`a fact or event that can be observed, especially one that is unusual`,eg:`This rally may be a short-term phenomenon.`,syn:`複數 phenomena（不規則複數，注意拼法）`},
  {id:"w603",en:"postpone...until",ipa:"/pəˈspəʊn/",pos:"phr.",u:"Day10",zh:"把…延到（某時間點）",def:`postpone + 事情 + until + 時間，是最標準常見的搭配`,eg:`The project may have to be postponed until next month.`,syn:`辨析 postpone...to 也對，但語意較模糊，until 更清楚指出延到哪個時間點`},
  {id:"w604",en:"stock rally",ipa:"/stɒk ˈræl.i/",pos:"phr.",u:"Day10",zh:"股市反彈",def:`a period of rising stock prices`,eg:`Analysts pointed out that the stock rally may be a short-term phenomenon.`,syn:`辨析 名詞+名詞語序是 stock rally，非 the rally of the stock`},

  // Day 11 單字
  {id:"w701",en:"check out",ipa:"/tʃek aʊt/",pos:"phr. v.",u:"Day11",zh:"去看看、去瞧瞧",def:`to look at or visit something to see if you like it`,eg:`Let's check it out sometime.`,syn:`辨析 及物用法，通常要接受詞（check it out / check out the place），不能只說 check out 結尾`},
  {id:"w702",en:"feel free to",ipa:"/fiːl friː tuː/",pos:"phr.",u:"Day11",zh:"歡迎、請隨意（做某事）",def:`used to tell someone they are allowed to do something`,eg:`Please feel free to contact us to discuss the details.`,syn:`辨析 ✗ it's welcome for you to... 此結構不存在；「歡迎你做…」= feel free to / you are welcome to`},
  {id:"w703",en:"purchasing power",ipa:"/ˈpɜː.tʃə.sɪŋ ˌpaʊ.ər/",pos:"n.",u:"Day11",zh:"（實質）購買力",def:`a person's or currency's ability to buy goods and services`,eg:`Consumers' real purchasing power has not fully recovered.`,syn:`辨析 ≠ consumption ability（此講法不存在）`},
  {id:"w704",en:"easing",ipa:"/ˈiː.zɪŋ/",pos:"n. (動名詞)",u:"Day11",zh:"（經濟數據）趨緩、降溫的過程",def:`the gerund form of "ease", describing the ongoing process of becoming less severe`,eg:`Despite the easing of inflation, real purchasing power has not fully recovered.`,syn:`辨析 ease(名詞)=輕鬆、容易，跟「降溫」意思完全不同；動態過程要用 easing`},

  // Day 12 單字
  {id:"w801",en:"at the last minute",ipa:"/æt ðə lɑːst ˈmɪn.ɪt/",pos:"phr.",u:"Day12",zh:"最後一刻",def:`at the final possible moment, just before it's too late`,eg:`I caught the bus at the last minute.`},
  {id:"w802",en:"catch up (with)",ipa:"/kætʃ ʌp/",pos:"phr. v.",u:"Day12",zh:"追上（進度、某人）",def:`to reach the same level or position as someone/something after being behind`,eg:`I need to catch up with my work.`,syn:`辨析 catch(趕上交通工具、抓住) vs catch up(追上進度)；✗ caught up the bus`},
  {id:"w803",en:"assistance",ipa:"/əˈsɪs.təns/",pos:"n. (U)",u:"Day12",zh:"協助、幫助",def:`help given to someone`,eg:`If you need any assistance, please contact us.`,syn:`辨析 assistance(不可數,協助) vs assistant(可數,助理/一個人)`},
  {id:"w804",en:"geopolitical",ipa:"/ˌdʒiː.əʊ.pəˈlɪt.ɪ.kəl/",pos:"adj.",u:"Day12",zh:"地緣政治的",def:`connected with political activity as influenced by geography`,eg:`Despite rising geopolitical risk, oil prices fluctuated only slightly.`,syn:`搭配 geopolitical risk / tension = 地緣政治風險／緊張情勢`},
  {id:"w805",en:"fluctuate",ipa:"/ˈflʌk.tʃu.eɪt/",pos:"v.",u:"Day12",zh:"波動（可上可下）",def:`to change or vary, especially continually and irregularly`,eg:`Oil prices fluctuated only slightly this week.`,syn:`辨析 fluctuate(中性,上下都算) ≠ rise(只表上升,方向明確)`},

  // Day 13 單字
  {id:"w901",en:"better than expected",ipa:"/ˈbet.ər ðən ɪkˈspek.tɪd/",pos:"phr.",u:"Day13",zh:"優於預期",def:`better than what people predicted`,eg:`Thanks to better-than-expected export figures, the market surged.`,syn:`同義 beat expectations；形容詞用連字號 better-than-expected + 名詞；辨析 ✗ prior to(在…之前，與「優於」無關)`,cam:"better"},
  {id:"w902",en:"surge",ipa:"/sɜːdʒ/",pos:"v./n.",u:"Day13",zh:"大漲、飆升",def:`to increase suddenly and strongly`,eg:`The market surged in early trading.`,syn:`辨析 surge=洶湧上漲、jump=跳漲、rally=跌後回升；rise sharply 也對但力道較弱`},
  {id:"w903",en:"in early trading",ipa:"/ɪn ˈɜː.li ˈtreɪ.dɪŋ/",pos:"phr.",u:"Day13",zh:"早盤（開盤後不久）",def:`in the period soon after the market opens`,eg:`Stocks jumped in early trading this morning.`,cam:"trading"},
  {id:"w904",en:"revised",ipa:"/rɪˈvaɪzd/",pos:"adj.",u:"Day13",zh:"修訂後的、修改過的",def:`changed in order to correct or improve it`,eg:`Attached is the revised draft of the contract.`,syn:`辨析 revised(正式,用於文件/合約) 比 modified 更貼合約、報告語境`,cam:"revised"},

  // Day 14 單字
  {id:"w1001",en:"turn out (to be)",ipa:"/tɜːn aʊt/",pos:"phr. v.",u:"Day14",zh:"結果（竟然）是、原來是",def:`to be discovered to be; to happen in a particular way, often unexpectedly`,eg:`I thought it would be boring, but it turned out to be great.`,syn:`辨析 帶「出乎意料」語感，對應中文「沒想到、結果竟然」`,cam:"turn-out"},
  {id:"w1002",en:"check with",ipa:"/tʃek wɪð/",pos:"phr. v.",u:"Day14",zh:"與某人確認、跟某人核對",def:`to ask someone for information or permission`,eg:`I need to check with my team before getting back to you.`,syn:`「跟某人確認」= check with(問一下) / confirm with(正式確認)，皆可；✗ confirm to；別跟 conform to(符合規範)搞混`,cam:"check"},
  {id:"w1003",en:"keep unchanged",ipa:"/kiːp ʌnˈtʃeɪndʒd/",pos:"phr.",u:"Day14",zh:"維持（利率等）不變",def:`to keep something at the same level`,eg:`The central bank decided to keep interest rates unchanged.`,syn:`同義 hold rates steady；皆央行標準用語`,cam:"unchanged"},
  {id:"w1004",en:"cautious",ipa:"/ˈkɔː.ʃəs/",pos:"adj.",u:"Day14",zh:"謹慎的、小心的",def:`careful to avoid problems or danger`,eg:`The central bank remains cautious about the inflation outlook.`,syn:`辨析 ⚠️ cautious(謹慎) ≠ modest(謙虛的、適度的)，完全不同別搞混`,cam:"cautious"},
  {id:"w1005",en:"inflation outlook",ipa:"/ɪnˈfleɪ.ʃən ˈaʊt.lʊk/",pos:"n.",u:"Day14",zh:"通膨走勢、通膨前景",def:`the expected future direction of inflation`,eg:`The Fed remains cautious about the inflation outlook.`,syn:`搭配 cautious about the inflation outlook = 對通膨走勢持謹慎態度`,cam:"outlook"},

  // Day 15 單字
  {id:"w1101",en:"unemployment rate",ipa:"/ˌʌn.ɪmˈplɔɪ.mənt reɪt/",pos:"n.",u:"Day15",zh:"失業率",def:`the percentage of people who are able to work but do not have a job`,eg:`The unemployment rate declined last quarter.`,syn:`辨析 ✗ nonjob rate(不存在)；固定就是 unemployment rate`,cam:"unemployment"},
  {id:"w1102",en:"worker",ipa:"/ˈwɜː.kər/",pos:"n.",u:"Day15",zh:"勞工、員工",def:`a person who works, especially one who does a particular kind of job`,eg:`Many workers are underpaid.`,syn:`辨析 worker(可數,一個個勞工) vs labor(不可數,勞動力/勞務概念)；✗ many labors`,cam:"worker"},
  {id:"w1103",en:"wage growth",ipa:"/weɪdʒ ɡrəʊθ/",pos:"n.",u:"Day15",zh:"薪資成長",def:`the rate at which wages increase over time`,eg:`Wage growth still isn't keeping up with inflation.`,syn:`不可數，動詞用單數；等同薪資(複數 salaries/wages)的成長`,cam:"wage"},
  {id:"w1104",en:"keep up with",ipa:"/kiːp ʌp wɪð/",pos:"phr. v.",u:"Day15",zh:"跟上（速度、進度、變化）",def:`to move or progress at the same rate as something else`,eg:`Wage growth isn't keeping up with inflation.`,syn:`辨析 keep up with=維持同速跟上；catch up with=落後後追上；✗ catch inflation`,cam:"keep-up"},
  {id:"w1105",en:"for your reference",ipa:"/fɔːr jɔːr ˈref.ər.əns/",pos:"phr.",u:"Day15",zh:"供您參考",def:`for you to look at or use as information`,eg:`The document is attached below for your reference.`,syn:`比 for you to check 正式、道地；商務 email 常用`,cam:"reference"},

  // Day 16 單字
  {id:"w1201",en:"adopt",ipa:"/əˈdɒpt/",pos:"v.",u:"Day16",zh:"採用、採納",def:`to accept or start to use something new`,eg:`More companies are adopting remote work.`,syn:`⚠️ 辨析 adopt(採用) ≠ adapt(適應、調整)，只差一字母意思完全不同`,cam:"adopt"},
  {id:"w1202",en:"remote work",ipa:"/rɪˈməʊt wɜːk/",pos:"n.",u:"Day16",zh:"遠端工作、遠距工作",def:`the practice of working from home or outside a traditional office`,eg:`More companies are adopting remote work.`,syn:`辨析 ✗ far-from-work(不存在)；固定 remote work / work from home (WFH)`,cam:"remote"},
  {id:"w1203",en:"demand for",ipa:"/dɪˈmɑːnd fɔːr/",pos:"phr.",u:"Day16",zh:"對…的需求",def:`the desire or need for something`,eg:`Demand for office space has dropped significantly.`,syn:`辨析 介係詞固定用 for（demand for X），✗ demand of`,cam:"demand"},
  {id:"w1204",en:"convenient",ipa:"/kənˈviː.ni.ənt/",pos:"adj.",u:"Day16",zh:"方便的",def:`suitable for your needs and easy to use, not causing problems`,eg:`If it's convenient for you, let's meet this week.`,syn:`⚠️ 主詞不能是人：✅ If it's convenient for you / ✗ if you feel convenient；也可用 Are you available?`,cam:"convenient"},
  {id:"w1205",en:"significantly",ipa:"/sɪɡˈnɪf.ɪ.kənt.li/",pos:"adv.",u:"Day16",zh:"顯著地、大幅地",def:`in a way that is large or important enough to have an effect`,eg:`Demand has dropped significantly.`,syn:`「明顯下滑」的明顯=幅度大→用 significantly / markedly。辨析 apparently：主要意思是「據說、看起來」(推測)；雖也有「顯然」的意思(知道即可)，但因推測語感太強易生歧義，強調幅度時避免用它`,cam:"significantly"},
  {id:"w1206",en:"work fine",ipa:"/wɜːk faɪn/",pos:"phr.",u:"Day16",zh:"正常運作",def:`to function correctly`,eg:`Luckily, the laptop still works fine.`,eg2:"My old phone is slow but it still works fine.",syn:`形容3C/日常物品「正常運作」；同義 work properly / function properly（properly 固定搭配 work/function，✗ perform properly）。辨析 works fine=沒壞 vs performs well=效能好；it's OK=沒事 vs its performance is OK=效能普普`,cam:"work"},

  // Day 17 單字
  {id:"w1301",en:"let alone",ipa:"/let əˈləʊn/",pos:"phr.",u:"Day17",zh:"更別說、遑論",def:`used after a negative statement to say that the next thing is even more unlikely`,eg:`I don't even have time to eat, let alone exercise.`,eg2:"I can't afford a car, let alone a house.",syn:`用法 ①前面要有否定/限制語氣(not/can't/hardly…)，even 非必須 ②後接對稱結構 ③純肯定句不能用，改 not to mention`,cam:"let-alone"},
  {id:"w1302",en:"so...that",ipa:"/səʊ ... ðæt/",pos:"phr.",u:"Day17",zh:"如此…以至於",def:`so + adjective/adverb + that + result clause`,eg:`I've been so busy that I don't even have time to eat.`,eg2:"The box was so heavy that I couldn't lift it.",syn:`辨析 so...that 強調程度大到造成某結果；too...to 是「太…而不能」(too busy to eat)`,cam:"so"},
  {id:"w1303",en:"startup",ipa:"/ˈstɑːt.ʌp/",pos:"n.",u:"Day17",zh:"新創公司",def:`a small business that has recently been started`,eg:`The startup is growing rapidly but isn't profitable yet.`,eg2:"My cousin quit his job to join a tech startup.",syn:`辨析 ✗ new industry company(不存在)；一個字 startup / start-up`,cam:"start-up"},
  {id:"w1304",en:"turn a profit",ipa:"/tɜːn ə ˈprɒf.ɪt/",pos:"phr.",u:"Day17",zh:"實現獲利、開始賺錢",def:`to make a profit`,eg:`The company has yet to turn a profit.`,eg2:"The little coffee shop finally turned a profit after two years.",syn:`辨析 實現獲利用 turn a profit(固定搭配)，非 get the profit`,cam:"profit"},
  {id:"w1305",en:"has yet to",ipa:"/hæz jet tuː/",pos:"phr.",u:"Day17",zh:"至今仍未…",def:`has still not done something up to now`,eg:`The startup has yet to turn a profit.`,eg2:"I've lived here for a year but have yet to visit the museum.",syn:`辨析 本身已含「至今仍未」(=still hasn't)，不用再加 until today`,cam:"yet"},
  {id:"w1306",en:"clear (adj) vs clearly (adv)",ipa:"/klɪər/ /ˈklɪə.li/",pos:"—",u:"Day17",zh:"clear 清楚的(形容詞) / clearly 清楚地(副詞)",def:`clear = adjective (modifies nouns); clearly = adverb (modifies verbs)`,eg:`a clear answer（明確的答覆）／ She explained it clearly.`,eg2:"Give me a clear answer. ／ Please speak clearly.",syn:`辨析 ✗ clearly answer（副詞不能修飾名詞，要用形容詞 clear）`,cam:"clear"},

  // Day 18 單字
  {id:"w1401",en:"incomplete",ipa:"/ˌɪn.kəmˈpliːt/",pos:"adj.",u:"Day18",zh:"不完整的、未完成的",def:`not having some parts, or not finished`,eg:`The decision was based on incomplete information.`,eg2:"My homework is still incomplete; I've only done half.",syn:`辨析 ✗ un-entire(不存在的自創字)；「不完整」固定用 incomplete`,cam:"incomplete"},
  {id:"w1402",en:"professional",ipa:"/prəˈfeʃ.ən.əl/",pos:"n.",u:"Day18",zh:"專業人士",def:`a person who does a job that needs special training or skill`,eg:`It's safer to hire a professional.`,eg2:"When my sink broke, I called a professional to fix it.",syn:`⚠️ 辨析 professional(可數,專業「人士」) vs expertise(不可數,專業「知識/技能」)`,cam:"professional"},
  {id:"w1403",en:"expertise",ipa:"/ˌek.spɜːˈtiːz/",pos:"n. (U)",u:"Day18",zh:"專業知識、專門技能",def:`a high level of knowledge or skill in a particular area`,eg:`She has great expertise in law.`,eg2:"He built the whole app himself — that takes real expertise.",syn:`⚠️ 辨析 expertise(抽象知識/技能,不可數) ≠ professional(專業人士,人)`,cam:"expertise"},
  {id:"w1404",en:"safer",ipa:"/ˈseɪ.fər/",pos:"adj.",u:"Day18",zh:"更安全的（safe 的比較級）",def:`comparative of safe`,eg:`It's safer to hire a professional.`,eg2:"Wearing a helmet is much safer.",syn:`規則 單音節形容詞比較級直接加 -er：safe→safer(✗ more safe)；雙音節以上才用 more`,cam:"safe"},
  {id:"w1405",en:"at this time",ipa:"/æt ðɪs taɪm/",pos:"phr.",u:"Day18",zh:"目前、暫時",def:`at the present moment, often implying it may change later`,eg:`We are unable to process your application at this time.`,eg2:"I'm not able to help at this time, but maybe later.",syn:`辨析 比 temporarily 更適合放句尾、更商務；「暫時無法」= unable to...at this time`,cam:"time"},
  {id:"w1406",en:"be replaced by",ipa:"/biː rɪˈpleɪst baɪ/",pos:"phr.",u:"Day18",zh:"被…取代",def:`to be substituted by something or someone else`,eg:`Many jobs will be replaced by AI.`,eg2:"The old printer was replaced by a faster one.",syn:`被動語態 be replaced by + 取代者`,cam:"replace"},

  // Day 19 單字
