  {id:"w1501",en:"binge-watch",ipa:"/ˈbɪndʒ.wɒtʃ/",pos:"v.",u:"Day19",zh:"追劇、一口氣連看",def:`to watch many episodes of a TV show one after another`,eg:`I ended up binge-watching a show until 2 a.m.`,eg2:"We binge-watched the whole series in one weekend.",syn:`追劇最貼的字；watch a show/dramas 也可`,cam:"binge-watch"},
  {id:"w1502",en:"go to bed (vs sleep)",ipa:"/ɡəʊ tə bed/",pos:"phr.",u:"Day19",zh:"上床睡覺（go to bed）",def:`go to bed = the act of getting into bed; sleep = the state of sleeping`,eg:`I go to bed at 11 but can't always sleep right away.`,eg2:"I try to go to bed early on weekdays.",syn:`辨析「早點睡」= go to bed early(✗ sleep early)；sleep 偏「睡著」的狀態`,cam:"go-to-bed"},
  {id:"w1503",en:"make a loss",ipa:"/meɪk ə lɒs/",pos:"phr.",u:"Day19",zh:"虧損",def:`to spend more money than you earn; to fail to make a profit`,eg:`The company made a loss last year.`,eg2:"The shop made a loss in its first year but recovered later.",syn:`也可 report/post a loss；✗ didn't get profit(沒賺≠虧損)；⇔ turn/make a profit`,cam:"loss"},
  {id:"w1504",en:"remain optimistic about",ipa:"/rɪˈmeɪn ˌɒptɪˈmɪstɪk əˈbaʊt/",pos:"phr.",u:"Day19",zh:"對…仍持樂觀、看好",def:`to continue to believe something good will happen`,eg:`Investors remain optimistic about its long-term prospects.`,eg2:"Despite the setback, she remains optimistic about the future.",syn:`⚠️ ≠ look forward to(期待、開心等待)；「看好、有信心」用 optimistic about / confident in`,cam:"optimistic"},
  {id:"w1505",en:"long-term prospects",ipa:"/ˌlɒŋ.tɜːm ˈprɒspekts/",pos:"n.",u:"Day19",zh:"長期前景、長遠發展",def:`the chances of future success over a long period`,eg:`Analysts are positive about the firm's long-term prospects.`,eg2:"He turned down the offer because the job had poor long-term prospects.",syn:`形容詞連字號 long-term。辨析三選一皆可：prospects=未來成功的可能性/機會(最貼「看好」)；outlook=對未來的展望/預測(中性,可好可壞,如 optimistic about the long-term outlook)；growth=成長本身(較具體)`,cam:"prospect"},
  {id:"w1506",en:"issue (vs question)",ipa:"/ˈɪʃuː/",pos:"n.",u:"Day19",zh:"議題、待處理的事項",def:`a subject or problem that people are thinking or talking about`,eg:`Regarding the budget issue we discussed...`,eg2:"We need to sort out this issue before the deadline.",syn:`辨析 issue(議題、待處理的事) vs question(要問的疑問)；「預算問題」用 issue`,cam:"issue"},

  // Day 20 單字
  {id:"w1601",en:"layoffs / lay off",ipa:"/ˈleɪ.ɒfs/ /leɪ ɒf/",pos:"n. / phr.v.",u:"Day20",zh:"裁員（名詞）／裁掉某人（動詞）",def:`layoffs (n.) = the act of ending workers' employment; lay off (v.) = to end someone's employment`,eg:`This wave of layoffs shows that even big tech companies are struggling.`,eg2:"The company laid off 500 workers last month.",syn:`辨析 名詞 layoff(s) 合寫；動詞 lay off 分開；✗ firing employee(不是名詞片語)`,cam:"layoff"},
  {id:"w1602",en:"a wave of",ipa:"/ə weɪv ɒv/",pos:"phr.",u:"Day20",zh:"一波…潮",def:`a sudden increase in a particular activity or feeling`,eg:`a wave of layoffs（裁員潮）／ a wave of protests（抗議潮）`,eg2:"A wave of nostalgia hit me when I saw the old photos.",syn:`後接複數名詞；媒體標準講法 a wave of tech layoffs`,cam:"wave"},
  {id:"w1603",en:"be immune to",ipa:"/biː ɪˈmjuːn tuː/",pos:"phr.",u:"Day20",zh:"對…免疫、不受…影響",def:`not affected by something`,eg:`Even big tech companies are not immune to the economic downturn.`,eg2:"Nobody is immune to criticism.",syn:`⚠️ 辨析「難以抵擋、無法倖免」用 not immune to；✗ can't resist(resist 是抵抗誘惑/攻擊)`,cam:"immune"},
  {id:"w1604",en:"economic downturn",ipa:"/ˌiː.kəˈnɒm.ɪk ˈdaʊn.tɜːn/",pos:"n.",u:"Day20",zh:"景氣寒冬、經濟下行",def:`a period when the economy becomes weaker`,eg:`Even big tech companies are not immune to the economic downturn.`,eg2:"Many shops closed during the economic downturn.",syn:`辨析 ✗ prospects winter(不存在)；同義 economic slowdown`,cam:"downturn"},
  {id:"w1605",en:"hold a meeting",ipa:"/həʊld ə ˈmiː.tɪŋ/",pos:"phr.",u:"Day20",zh:"召開會議",def:`to have or organise a meeting`,eg:`We suggest holding a weekly progress meeting.`,eg2:"We hold a team meeting every Monday morning.",syn:`hold(較正式)／have(口語)皆可；✗ open a meeting`,cam:"hold"},
  {id:"w1606",en:"on schedule",ipa:"/ɒn ˈʃed.juːl/",pos:"phr.",u:"Day20",zh:"如期、按進度",def:`happening at the planned or expected time`,eg:`To ensure the project is completed on schedule...`,eg2:"The train arrived right on schedule.",syn:`同義 on time；⇔ behind schedule(進度落後)／ahead of schedule(超前)`,cam:"schedule"},

  // Day 21 單字
  {id:"w1701",en:"so-so",ipa:"/ˈsəʊ.səʊ/",pos:"adj.",u:"Day21",zh:"普普通通、不好不壞",def:`between average quality and low quality; not good or well`,eg:`The food is so-so, but the service is great.`,eg2:'"How was the movie?" "So-so."',syn:`要連字號 so-so；語感偏「average 以下一點」`,cam:"so-so"},
  {id:"w1702",en:"nothing special",ipa:"/ˈnʌθ.ɪŋ ˈspeʃ.əl/",pos:"phr.",u:"Day21",zh:"普通、沒什麼特別",def:`ordinary; not remarkable`,eg:`The food is nothing special.`,eg2:"The hotel was nothing special, but it was cheap.",syn:`⚠️ 辨析 中文「普通」≠ normal(正常的、沒異常)！「餐點普通」用 nothing special / average / so-so`,cam:"special"},
  {id:"w1703",en:"contact (vt)",ipa:"/ˈkɒn.tækt/",pos:"v.",u:"Day21",zh:"聯絡（某人）",def:`to communicate with someone`,eg:`Please do not hesitate to contact me.`,eg2:"You can contact me by email anytime.",syn:`⚠️ 及物動詞，不加 to（✗ contact to me）；直接 contact + 人`,cam:"contact"},
  {id:"w1704",en:"ask for",ipa:"/ɑːsk fɔːr/",pos:"phr. v.",u:"Day21",zh:"要求、索取（某物）",def:`to request something`,eg:`the information you asked for（你要求的資料）`,eg2:"He asked for a glass of water.",syn:`ask for + 東西(少了 for 不完整)；request 是及物不用 for(the information you requested)`,cam:"ask-for"},
  {id:"w1705",en:"spread the risk",ipa:"/spred ðə rɪsk/",pos:"phr.",u:"Day21",zh:"分散風險",def:`to reduce risk by investing in different things`,eg:`Analysts recommended that investors should spread their risk(s).`,eg2:"Don't put all your eggs in one basket.（諺語：別把雞蛋放同一個籃子）",syn:`同義 diversify (the) risk；✗ separate risks。⚠️ 單複數皆可：risk 是可數/不可數兩用（Oxford 標 [C, U]）→ spread their risks(複數,各種風險) ✅ / spread the risk(不可數,風險這個概念) ✅ 兩者 Cambridge 都收。判斷順序：先問「此語境可數嗎」，再問「有幾個」`,cam:"risk"},
  {id:"w1706",en:"store vs restaurant",ipa:"/stɔːr/ /ˈres.trɒnt/",pos:"n.",u:"Day21",zh:"store 商店（零售）／ restaurant 餐廳",def:`store = a shop selling goods; restaurant = a place where meals are served`,eg:`the food at this restaurant（這家餐廳的餐點）`,eg2:"I bought milk at the store, then had lunch at a restaurant.",syn:`辨析「這家店」指餐廳時用 restaurant 或 place，不用 store`,cam:"restaurant"}
];
for(const w of WORDS){
  const link = `<a href='${C}${(w.cam||w.en).replace(/ /g,'-')}' target='_blank'>Cambridge</a>`;
  const base = [];
  if(w.def) base.push(["EN",w.def]);
  if(w.eg) base.push(["例",w.eg]);
  if(w.eg2) base.push(["生活例",w.eg2]);
  if(w.syn) base.push(["相關",w.syn]);
  if(w.ex) base.push(["補充",w.ex]);
  base.push(["🔊",link]);
  const sp = w.sp || w.en;
  DECK.push({ id:w.id+"-p", type:"vocab", tags:["單字",w.u], qlabel:"中 → 英", speak:sp,
    front:`「${w.zh}」${w.pos?'('+w.pos+')':''}<br>英文？`,
    answer:`${w.en} <span class="ipa">${w.ipa}</span>`, analysis:base });
  DECK.push({ id:w.id+"-r", type:"vocab", tags:["單字",w.u,"英→中"], qlabel:"英 → 中", speak:sp,
    front:`${w.en} <span class="ipa">${w.ipa}</span> ${w.pos?'('+w.pos+')':''}<br>中文意思？`,
    answer:`${w.zh}`, analysis:base });
}

// ---------- Storage (localStorage) ----------
const KEY="ce-srs-v1";
const NEW_PER_DAY=30;
function loadRaw(){ try{ return JSON.parse(localStorage.getItem(KEY)||"null"); }catch(e){ return null; } }
function saveRaw(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} }

function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function dstr(d){ const z=new Date(d.getTime()-d.getTimezoneOffset()*60000); return z.toISOString().slice(0,10); }
function addDays(n){ const d=today(); d.setDate(d.getDate()+n); return dstr(d); }
const TODAY=dstr(today());

function loadState(){
  let s=loadRaw();
  if(!s){ s={cards:{}, newByDate:{}}; }
  for(const c of DECK){ if(!s.cards[c.id]) s.cards[c.id]={ef:2.5,interval:0,reps:0,due:null,introduced:false}; }
  return s;
}
function saveState(s){ saveRaw(s); }

// ---------- Pronunciation (device TTS) ----------
let VOICES=[];
function loadVoices(){ try{ VOICES = window.speechSynthesis ? speechSynthesis.getVoices() : []; }catch(e){ VOICES=[]; } }
if(window.speechSynthesis){ loadVoices(); window.speechSynthesis.onvoiceschanged=loadVoices; }
function speak(word,lang){
  if(!window.speechSynthesis){ alert("此裝置不支援內建發音，請點 Cambridge 連結。"); return; }
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(word); u.lang=lang; u.rate=0.9;
    const v=VOICES.find(v=>v.lang&&v.lang.replace("_","-")===lang)||VOICES.find(v=>v.lang&&v.lang.toLowerCase().startsWith(lang.slice(0,2)));
    if(v) u.voice=v; speechSynthesis.speak(u);
  }catch(e){}
}

// ---------- Scheduling (SM-2 lite) ----------
function nextInterval(cs,q){
  if(q==="again") return 0;
  if(cs.reps===0){            // 新卡第一次複習：固定階梯
    return q==="hard"?1 : q==="good"?2 : 4;
  }
  const iv = cs.interval<1?1:cs.interval;
  const hard = Math.max(1, Math.round(iv*1.2));
  const good = Math.max(hard+1, Math.round(iv*cs.ef));
  const easy = Math.max(good+1, Math.round(iv*cs.ef*1.5));
  return q==="hard"?hard : q==="good"?good : easy;
}
function preview(cs,q){
  if(q==="again") return "<1分";
  return nextInterval(cs,q)+"天";
}
function applyGrade(s,c,q){ const cs=s.cards[c.id];
  if(!cs.introduced){ cs.introduced=true; s.newByDate[TODAY]=(s.newByDate[TODAY]||0)+1; }
  const iv = nextInterval(cs,q);
  if(q==="again"){ cs.reps=0; cs.interval=0; cs.ef=Math.max(1.3,cs.ef-0.2); cs.due=TODAY; return "again"; }
  if(q==="hard") cs.ef=Math.max(1.3,cs.ef-0.15);
  if(q==="easy") cs.ef=cs.ef+0.15;
  cs.reps+=1; cs.interval=iv; cs.due=addDays(iv);
  return "scheduled";
}

// ---------- Filtering ----------
const GRAMMAR_TAGS = ["文法","辨析","易錯","用法"];
const FUNCTIONAL_TAGS = new Set(["單字","句子","文法","辨析","易錯","用法","片語","英→中"]);
function isGrammar(c){ return c.type==="grammar" || c.tags.some(t=>GRAMMAR_TAGS.includes(t)); }
function isVocab(c){ return c.type==="vocab" && !isGrammar(c); }
function isSentence(c){ return c.type==="sentence"; }
let FILTER="all";
let DAY_MIN=null, DAY_MAX=null;
let HW_MODE="all"; // 'all' | 具體 HW 編號字串(如 '1','2') — 使用者可自選要複習哪一批作業
function maxHw(){ let m=null; for(const c of DECK){ const h=hwOf(c); if(h!==null && (m===null||h>m)) m=h; } return m; }
function allHwNumbers(){ const set=new Set(); for(const c of DECK){ const h=hwOf(c); if(h!==null) set.add(h); } return [...set].sort((a,b)=>a-b); }
function matchesHwRange(c){
  if(HW_MODE==="all") return true; // 全部作業：不限制
  return hwOf(c)===parseInt(HW_MODE); // 選特定 HW：只留那一批，其他(含無 HW 標籤的卡)一律排除
}
function dayOf(c){
  for(const t of c.tags){
    let m=/^D(\d+)$/.exec(t); if(m) return parseInt(m[1]);
    m=/^Day(\d+)$/.exec(t); if(m) return parseInt(m[1]);
  }
  return null; // 無日期標籤的卡（每日翻譯練習以外的批次）
}
// 英文課回家複習週次（例如 HW1、HW2…），跟 Day 系統完全分開的另一條時間軸
function hwOf(c){
  for(const t of c.tags){
    const m=/^HW(\d+)$/.exec(t); if(m) return parseInt(m[1]);
  }
  return null;
}
// 主題：只用於「既沒有 Day 也沒有 HW 週次」的一次性批次（例如字表/Crime/Arts、單次考試單字）
function topicOf(c){
  if(dayOf(c)!==null || hwOf(c)!==null) return null;
  const t=c.tags.find(t=>!FUNCTIONAL_TAGS.has(t));
  return t||null;
}
let ALL_TOPICS=[]; let TOPIC_ACTIVE=new Set();
function initTopics(){
  ALL_TOPICS=[...new Set(DECK.map(topicOf).filter(Boolean))];
  TOPIC_ACTIVE=new Set(ALL_TOPICS); // 預設全選
}
function matchesDayRange(c){
  const d=dayOf(c);
  if(d===null) return true; // 無 Day 標籤的卡不受此列限制
  if(DAY_MIN!==null && d<DAY_MIN) return false;
  if(DAY_MAX!==null && d>DAY_MAX) return false;
  return true;
}
function matchesTopic(c){
  const tp=topicOf(c);
  if(tp===null) return true; // 有 Day 或 HW 標籤的卡不受主題篩選限制
  return TOPIC_ACTIVE.has(tp);
}
function matchesFilter(c){
  if(!matchesDayRange(c)) return false;
  if(!matchesHwRange(c)) return false;
  if(!matchesTopic(c)) return false;
  if(FILTER==="all") return true;
  if(FILTER==="單字") return isVocab(c);
  if(FILTER==="句子") return isSentence(c);
  if(FILTER==="grammar") return isGrammar(c);
  return true;
}
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// ---------- Session ----------
let STATE, queue=[], extraToday=0, MODE="srs";
const BATCH=15;
function buildQueue(){
  if(MODE==="free"){ queue=shuffle(DECK.filter(matchesFilter).map(c=>c.id)); return; }
  const pool=DECK.filter(matchesFilter);
  const rev=[],news=[];
  for(const c of pool){ const cs=STATE.cards[c.id];
    if(cs.introduced){ if(cs.due && cs.due<=TODAY) rev.push(c.id); } else news.push(c.id); }
  const allow=Math.max(0,NEW_PER_DAY-(STATE.newByDate[TODAY]||0))+extraToday;
  queue=[...rev,...news.slice(0,allow)];
}
function counts(){
  if(MODE==="free"){ document.getElementById("c-rev").textContent=queue.length; document.getElementById("c-new").textContent="—"; return; }
  let r=0,n=0; for(const id of queue){ STATE.cards[id].introduced?r++:n++; }
  document.getElementById("c-rev").textContent=r; document.getElementById("c-new").textContent=n;
}
function nextDue(){ let m=null; for(const c of DECK.filter(matchesFilter)){ const d=STATE.cards[c.id].due; if(d&&(!m||d<m)) m=d; } return m; }
function remainingUnseen(){ return DECK.filter(matchesFilter).filter(c=>!STATE.cards[c.id].introduced).length; }

function render(){
  counts();
  const stage=document.getElementById("stage");
  if(queue.length===0){
    if(MODE==="free"){
      stage.innerHTML=`<div class="done"><div class="big">🔁</div><p>這輪自由練習做完了（不影響正式進度）。</p>
        <button class="reveal" id="againBtn" style="margin-top:10px;">再來一輪（重新洗牌）</button></div>`;
      document.getElementById("againBtn").onclick=()=>{ buildQueue(); render(); };
      return;
    }
    const nd=nextDue(); const left=remainingUnseen();
    stage.innerHTML=`<div class="done"><div class="big">🎉</div><p>這批複習完了。</p>
      <p>${nd?("到期複習下次："+nd):"目前沒有其他到期卡"}</p>
      ${left>0?`<p style="margin-top:14px;">還有 <b>${left}</b> 張新卡沒看過</p>
        <button class="reveal" id="moreBtn" style="margin-top:8px;">再複習一批新卡（${Math.min(BATCH,left)} 張）</button>`
        : `<p>這個範圍的卡都看過了 👏</p>`}
      </div>`;
    if(left>0){ document.getElementById("moreBtn").onclick=()=>{ extraToday+=BATCH; buildQueue(); render(); }; }
    return;
  }
  const c=DECK.find(x=>x.id===queue[0]); const cs=STATE.cards[c.id]; const isNew=!cs.introduced;
  stage.innerHTML=`
    ${MODE==="free"?'<span class="freebadge">🔁 自由練習中（不影響正式進度）</span>':''}
    <div class="card">
      <div class="tagbar">${c.tags.map(t=>`<span class="tag">${t}</span>`).join("")}${isNew&&MODE==="srs"?'<span class="tag" style="color:var(--pine);border-color:var(--pine)">新</span>':''}</div>
      <div class="front"><div class="qlabel">${c.qlabel}</div><div class="prompt">${c.front}</div></div>
      <div id="backwrap" class="hide">
        <div class="divider"></div>
        <div class="back">
          <div class="seg"><div class="seg-h">參考答案</div>
            <div class="answer">${c.answer}${c.speak?(()=>{ const items=(Array.isArray(c.speak)?c.speak:[c.speak]).map(x=> typeof x==="string" ? {label:x, text:x} : x);
              return `<span class="say">${items.map(it=>`<span class="sayword">${items.length>1?`<em>${it.label}</em>`:''}<button class="sayb" data-w="${it.text.replace(/"/g,'&quot;')}" data-l="en-GB">🔊 UK</button><button class="sayb" data-w="${it.text.replace(/"/g,'&quot;')}" data-l="en-US">🔊 US</button></span>`).join('')}</span>`; })():''}</div></div>
          <div class="seg"><div class="seg-h">解析</div>
            <div class="analysis">${c.analysis.map(a=>`<div><span class="ar">${a[0]}</span> → ${a[1]}</div>`).join("")}</div></div>
        </div>
      </div>
      <div class="controls">
        <button class="reveal" id="revealBtn">顯示答案</button>
        <div class="grades hide" id="grades">
          ${MODE==="free" ? `
          <button class="grade g-again" data-q="again">還不熟</button>
          <button class="grade g-hard"  data-q="hard">普通</button>
          <button class="grade g-good"  data-q="good">會了</button>
          <button class="grade g-easy"  data-q="easy">秒懂</button>` : `
          <button class="grade g-again" data-q="again">重來<span class="iv">${preview(cs,'again')}</span></button>
          <button class="grade g-hard"  data-q="hard">困難<span class="iv">${preview(cs,'hard')}</span></button>
          <button class="grade g-good"  data-q="good">良好<span class="iv">${preview(cs,'good')}</span></button>
          <button class="grade g-easy"  data-q="easy">簡單<span class="iv">${preview(cs,'easy')}</span></button>`}
        </div>
      </div>
    </div>`;
  document.getElementById("revealBtn").onclick=()=>{
    document.getElementById("backwrap").classList.remove("hide");
    document.getElementById("revealBtn").classList.add("hide");
    document.getElementById("grades").classList.remove("hide");
    if(c.speak){ const first=Array.isArray(c.speak)?c.speak[0]:c.speak; speak(typeof first==="string"?first:first.text,"en-US"); }
  };
  document.querySelectorAll(".sayb").forEach(b=>{ b.onclick=()=>speak(b.dataset.w,b.dataset.l); });
  document.querySelectorAll(".grade").forEach(b=>{
    b.onclick=()=>{
      const q=b.dataset.q;
      if(MODE==="free"){
        queue.shift(); if(q==="again") queue.push(c.id); render(); return; // 不寫回 STATE，不影響正式進度
      }
      const r=applyGrade(STATE,c,q); saveState(STATE);
      queue.shift(); if(r==="again") queue.push(c.id); render();
    };
  });
}

// ---------- Mode bar wiring ----------
document.querySelectorAll('.chip[data-mode]').forEach(b=>{
  b.onclick=()=>{
    MODE=b.dataset.mode;
    document.querySelectorAll('.chip[data-mode]').forEach(x=>x.classList.toggle('active',x===b));
    extraToday=0; buildQueue(); render();
  };
});
document.querySelectorAll('.chip[data-filter]').forEach(b=>{
  b.onclick=()=>{
    FILTER=b.dataset.filter;
    document.querySelectorAll('.chip[data-filter]').forEach(x=>x.classList.toggle('active',x===b));
    extraToday=0; buildQueue(); render();
  };
});
document.getElementById('applyDay').onclick=()=>{
  const f=document.getElementById('dayFrom').value, t=document.getElementById('dayTo').value;
  DAY_MIN = f!==""?parseInt(f):null;
  DAY_MAX = t!==""?parseInt(t):null;
  extraToday=0; buildQueue(); render();
};
document.getElementById('clearDay').onclick=()=>{
  DAY_MIN=null; DAY_MAX=null;
  document.getElementById('dayFrom').value=""; document.getElementById('dayTo').value="";
  extraToday=0; buildQueue(); render();
};
document.getElementById('hwModeSelect').onchange=(e)=>{
  HW_MODE=e.target.value;
  extraToday=0; buildQueue(); render();
};

// ---------- Topic chips (dynamic, one per non-day batch e.g. 字表/Crime/Arts/考試批次) ----------
function renderTopicBar(){
  const wrap=document.getElementById('topicbar');
  if(ALL_TOPICS.length===0){ document.getElementById('topicbarWrap').style.display='none'; return; }
  wrap.innerHTML=ALL_TOPICS.map(tp=>`<button class="chip small ${TOPIC_ACTIVE.has(tp)?'topic-on':'topic-off'}" data-topic="${tp}">${tp}</button>`).join('');
  wrap.querySelectorAll('.chip[data-topic]').forEach(b=>{
    b.onclick=()=>{
      const tp=b.dataset.topic;
      if(TOPIC_ACTIVE.has(tp)) TOPIC_ACTIVE.delete(tp); else TOPIC_ACTIVE.add(tp);
      renderTopicBar(); extraToday=0; buildQueue(); render();
    };
  });
}
document.getElementById('topicAll').onclick=()=>{ TOPIC_ACTIVE=new Set(ALL_TOPICS); renderTopicBar(); extraToday=0; buildQueue(); render(); };
document.getElementById('topicNone').onclick=()=>{ TOPIC_ACTIVE=new Set(); renderTopicBar(); extraToday=0; buildQueue(); render(); };

initTopics(); renderTopicBar();
// 動態填入英文課回家複習的下拉：全部作業 + 每一批 HW（HW1、HW2…）
(function buildHwDropdown(){
  const sel=document.getElementById('hwModeSelect');
  const nums=allHwNumbers();
  if(nums.length===0){ document.getElementById('hwbar').style.display='none'; return; }
  sel.innerHTML='<option value="all">全部作業</option>'+nums.map(n=>`<option value="${n}">HW${n}</option>`).join('');
  sel.value=HW_MODE;
})();
STATE=loadState(); buildQueue(); render();

// ---------- 備份 / 還原 ----------
function bkSay(msg, ok){
  const el=document.getElementById('bkMsg');
  el.textContent=msg; el.className = ok===false ? 'err' : (ok===true ? 'ok' : '');
  if(msg) setTimeout(()=>{ if(el.textContent===msg){ el.textContent=''; el.className=''; } }, 6000);
}
function studiedCount(st){
  let n=0; for(const id in (st.cards||{})){ const c=st.cards[id]; if(c && (c.reps>0 || c.introduced)) n++; }
  return n;
}
document.getElementById('btnExport').onclick=()=>{
  try{
    const now=new Date();
    const pad=(x)=>String(x).padStart(2,'0');
    const stamp=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    const payload={
      app:"ce-srs", format:1, key:KEY,
      exportedAt: now.toISOString(),
      totalCards: DECK.length,
      studied: studiedCount(STATE),
      state: STATE
    };
    const blob=new Blob([JSON.stringify(payload)], {type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`英文複習備份_${stamp}.json`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1000);
    bkSay(`已匯出備份（${payload.studied} 張卡的進度）`, true);
  }catch(e){ bkSay('匯出失敗：'+e.message, false); }
};
document.getElementById('btnImport').onclick=()=>{ document.getElementById('fileImport').click(); };
document.getElementById('fileImport').onchange=(e)=>{
  const f=e.target.files && e.target.files[0];
  if(!f) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      const st = (data && data.state) ? data.state : data; // 容許直接餵 state
      if(!st || typeof st!=='object' || !st.cards || typeof st.cards!=='object'){
        bkSay('這個檔案不是有效的備份', false); return;
      }
      const incoming=studiedCount(st), current=studiedCount(STATE);
      if(!confirm(`還原備份會覆蓋目前的進度。\n\n備份：${incoming} 張卡有進度${data.exportedAt?`（${data.exportedAt.slice(0,10)}）`:''}\n目前：${current} 張卡有進度\n\n確定要還原嗎？`)) { bkSay(''); return; }
      // 以備份為主，補上目前牌組有但備份沒有的新卡
      const merged={ cards:{}, newByDate: st.newByDate || {} };
      for(const c of DECK){
        merged.cards[c.id] = st.cards[c.id] || {ef:2.5,interval:0,reps:0,due:null,introduced:false};
      }
      STATE=merged; saveState(STATE); buildQueue(); render();
      bkSay(`已還原備份（${incoming} 張卡的進度）`, true);
    }catch(err){ bkSay('讀取失敗：'+err.message, false); }
  };
  reader.onerror=()=>bkSay('讀取檔案失敗', false);
  reader.readAsText(f);
  e.target.value='';
};
</script>
